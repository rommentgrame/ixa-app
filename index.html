<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA — Intelligence Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --sidebar: #111116;
            --card: #18181f;
            --accent: #a8ff3e;
            --accent-soft: rgba(168, 255, 62, 0.1);
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --user-bubble: #27272e;
            --error: #ef4444;
            --success: #22c55e;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background: var(--bg); color: var(--text); 
            display: flex; height: 100vh; width: 100vw; overflow: hidden; 
        }

        #sidebar {
            width: 300px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }

        .brand {
            font-size: 1.5rem; font-weight: 700; color: var(--accent);
            display: flex; align-items: center; gap: 10px; margin-bottom: 30px;
        }

        .btn-new-chat {
            background: var(--accent); color: #000; border: none; padding: 14px;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: var(--transition);
            margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        .chat-item {
            padding: 12px; border-radius: 10px; font-size: 0.9rem; color: var(--text-muted);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent; transition: var(--transition);
        }

        .chat-item.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1a1a25, #0b0b0f); }

        header {
            height: 70px; padding: 0 40px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(11, 11, 15, 0.8); backdrop-filter: blur(10px);
        }

        .nav-tabs { display: flex; gap: 30px; }
        .nav-tabs span { cursor: pointer; color: var(--text-muted); padding: 10px 0; transition: 0.3s; }
        .nav-tabs span.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        #chat-container { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 30px; }

        .message { max-width: 85%; line-height: 1.7; animation: slideIn 0.4s ease-out; }
        .message.user { align-self: flex-end; background: var(--user-bubble); padding: 15px 22px; border-radius: 20px 20px 4px 20px; border: 1px solid var(--border); }
        .message b { display: block; font-size: 0.75rem; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }

        /* Mode Vocal Orb */
        #voice-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .orb { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; filter: blur(2px); transition: 0.5s; position: relative; }
        .listening .orb { transform: scale(1.3); box-shadow: 0 0 50px var(--accent); }

        #input-area { padding: 20px 15% 40px 15%; }
        .input-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 12px; }
        textarea { flex: 1; background: none; border: none; color: var(--text); padding: 10px; resize: none; outline: none; font-size: 1rem; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="brand">IXA SYSTEM</div>
    <button class="btn-new-chat" onclick="createNewChat()">+ Nouveau Chat</button>
    <div id="history-list"></div>
    <div id="api-status-label" style="font-size: 0.7rem; margin-top: 20px;">Vérification...</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span id="tab-chat" class="active" onclick="switchMode('chat')">Assistant</span>
            <span id="tab-voice" onclick="switchMode('voice')">Mode Vocal</span>
        </div>
    </header>

    <div id="chat-container"></div>

    <div id="voice-view">
        <div id="orb-container"><div class="orb" id="orb"></div></div>
        <h2 id="v-status" style="margin-top: 40px;">Cliquez pour parler</h2>
        <button class="btn-new-chat" style="margin-top: 20px; padding: 15px 40px;" onclick="toggleVoice()">🎙️ PARLER</button>
    </div>

    <div id="input-area">
        <div id="attachment-tray"></div>
        <div class="input-wrapper">
            <input type="file" id="file-input" hidden multiple onchange="handleFileUpload(this)">
            <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">📎</button>
            <textarea id="main-input" placeholder="Message..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button onclick="handleSend()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size: 1.2rem;">▲</button>
        </div>
    </div>
</main>

<script>
    const IXA = {
        key: localStorage.getItem('ixa_key') || "",
        model: "llama-3.1-8b-instant",
        history: JSON.parse(localStorage.getItem('ixa_history')) || [],
        currentChatId: null,
        attachments: [],
        recognition: null,
        isListening: false,
        synth: window.speechSynthesis
    };

    async function boot() {
        if (!IXA.key) await tryLoadConfig();
        updateApiStatus();
        renderHistory();
        IXA.history.length > 0 ? loadChat(IXA.history[0].id) : createNewChat();

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            IXA.recognition = new Speech();
            IXA.recognition.lang = 'fr-FR';
            IXA.recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('v-status').textContent = "IXA réfléchit...";
                const reply = await handleSend(text);
                if (reply) speak(reply);
            };
            IXA.recognition.onend = () => {
                IXA.isListening = false;
                document.getElementById('orb').parentElement.classList.remove('listening');
                document.getElementById('v-status').textContent = "Cliquez pour parler";
            };
        }
    }

    async function tryLoadConfig() {
        try {
            const res = await fetch('config.json');
            const data = await res.json();
            if (data.groq_api_key) {
                IXA.key = data.groq_api_key;
                localStorage.setItem('ixa_key', IXA.key);
            }
        } catch (e) {}
    }

    function updateApiStatus() {
        document.getElementById('api-status-label').innerHTML = IXA.key ? "● API OK" : "● ERREUR CONFIG";
    }

    function createNewChat() {
        const id = Date.now();
        IXA.history.unshift({ id, title: "Nouveau Chat", messages: [] });
        saveAll(); loadChat(id);
    }

    function loadChat(id) {
        IXA.currentChatId = id;
        const chat = IXA.history.find(c => c.id === id);
        const cont = document.getElementById('chat-container');
        cont.innerHTML = "";
        chat.messages.forEach(m => renderMessage(m.role, m.displayContent || m.content));
        renderHistory();
    }

    function handleFileUpload(input) {
        for (let f of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                IXA.attachments.push({ name: f.name, content: e.target.result });
                document.getElementById('attachment-tray').innerHTML += `<div style="color:var(--accent); font-size:0.8rem;">📄 ${f.name}</div>`;
            };
            reader.readAsText(f);
        }
    }

    async function handleSend(voiceText = null) {
        const input = document.getElementById('main-input');
        const text = voiceText || input.value.trim();
        if (!text && IXA.attachments.length === 0) return;

        let prompt = text;
        if (IXA.attachments.length > 0) {
            prompt = "DOCUMENTS:\n" + IXA.attachments.map(a => `[${a.name}]\n${a.content}`).join('\n') + "\nQUESTION: " + text;
        }

        renderMessage('user', text || "Analyse de documents");
        input.value = "";
        
        const chat = IXA.history.find(c => c.id === IXA.currentChatId);
        chat.messages.push({ role: 'user', content: prompt, displayContent: text });

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${IXA.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: IXA.model, messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            renderMessage('assistant', reply);
            chat.messages.push({ role: 'assistant', content: reply });
            saveAll();
            IXA.attachments = [];
            document.getElementById('attachment-tray').innerHTML = "";
            return reply;
        } catch (e) {
            renderMessage('assistant', "Erreur API.");
            return null;
        }
    }

    function renderMessage(role, content) {
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA'}</b><div>${content}</div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
    }

    function switchMode(mode) {
        document.getElementById('chat-container').style.display = mode === 'chat' ? 'flex' : 'none';
        document.getElementById('input-area').style.display = mode === 'chat' ? 'block' : 'none';
        document.getElementById('voice-view').style.display = mode === 'chat' ? 'none' : 'flex';
        document.getElementById('tab-chat').classList.toggle('active', mode === 'chat');
        document.getElementById('tab-voice').classList.toggle('active', mode === 'voice');
        if (mode === 'chat') IXA.synth.cancel();
    }

    function toggleVoice() {
        if (!IXA.recognition) return alert("Vocal non supporté.");
        IXA.synth.cancel();
        IXA.isListening = true;
        document.getElementById('orb').parentElement.classList.add('listening');
        document.getElementById('v-status').textContent = "Je vous écoute...";
        IXA.recognition.start();
    }

    function speak(text) {
        if (document.getElementById('tab-voice').classList.contains('active')) {
            const utter = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
            utter.lang = 'fr-FR';
            IXA.synth.speak(utter);
        }
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = IXA.history.map(c => 
            `<div class="chat-item ${c.id === IXA.currentChatId ? 'active' : ''}" onclick="loadChat(${c.id})">${c.title}</div>`
        ).join('');
    }

    function saveAll() { localStorage.setItem('ixa_history', JSON.stringify(IXA.history)); }

    boot();
</script>
</body>
</html>

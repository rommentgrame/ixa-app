<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA — INFINITY MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070709;
            --surface: #0f0f13;
            --accent: #a8ff3e;
            --accent-soft: rgba(168, 255, 62, 0.1);
            --text: #f4f4f5;
            --text-muted: #71717a;
            --border: #1f1f23;
            --msg-user: #1a1a20;
            --error: #ff4b4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        header {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: rgba(7, 7, 9, 0.8); backdrop-filter: blur(10px);
            z-index: 100;
        }
        .logo { font-weight: 800; color: var(--accent); letter-spacing: 1px; font-size: 1.1rem; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-muted); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* CHAT AREA */
        #chat-scroller {
            flex: 1; overflow-y: auto; padding: 40px 18%; display: flex; flex-direction: column; gap: 30px;
            scroll-behavior: smooth;
        }

        .msg-box { display: flex; flex-direction: column; width: 100%; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .msg-box.user { align-items: flex-end; }
        .msg-box.assistant { align-items: flex-start; }

        .bubble {
            max-width: 85%; line-height: 1.7; font-size: 1rem; position: relative;
        }
        .user .bubble {
            background: var(--msg-user); padding: 14px 22px; border-radius: 20px 20px 4px 20px;
            border: 1px solid var(--border);
        }
        .assistant .bubble { width: 100%; }

        .bubble b {
            display: block; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 10px; color: var(--accent);
        }

        /* CLAUDE STYLE FILES */
        .file-entry {
            display: inline-flex; align-items: center; gap: 10px; background: var(--surface);
            border: 1px solid var(--border); padding: 12px 18px; border-radius: 12px;
            margin-top: 10px; font-size: 0.9rem; transition: 0.2s;
        }
        .file-entry:hover { border-color: var(--accent); }

        /* CODE BLOCKS */
        pre {
            background: #000; padding: 18px; border-radius: 12px; overflow-x: auto;
            margin: 15px 0; border: 1px solid var(--border); font-family: 'Fira Code', monospace;
        }
        code { font-family: 'Fira Code', monospace; color: #e4e4e7; }

        /* INPUT SYSTEM */
        #footer { padding: 20px 18% 40px 18%; background: linear-gradient(transparent, var(--bg) 40%); }
        .input-container {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 12px 18px; display: flex; align-items: flex-end; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

        textarea {
            flex: 1; background: none; border: none; color: var(--text); padding: 10px 0;
            resize: none; max-height: 200px; outline: none; font-size: 1.05rem; line-height: 1.5;
        }

        .btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 10px; border-radius: 12px; transition: 0.2s;
        }
        .btn:hover { color: var(--accent); background: var(--accent-soft); }
        .btn-send { color: var(--accent); transform: rotate(-45deg); margin-bottom: 4px; }

        #attachment-tray { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag {
            background: var(--accent-soft); color: var(--accent); padding: 6px 14px;
            border-radius: 10px; font-size: 0.8rem; border: 1px solid rgba(168,255,62,0.2);
        }

        /* VOCAL MODE */
        #vocal-overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 200; flex-direction: column; align-items: center; justify-content: center;
        }
        .orb {
            width: 150px; height: 150px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 60px var(--accent-soft); transition: 0.5s;
        }
        .orb.pulse { animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }

        /* UTILS */
        .clear-btn { font-size: 0.7rem; background: var(--border); color: var(--text-muted); padding: 4px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">IXA INFINITY</div>
    <div class="status">
        <span id="model-name">Llama 3.3 70B</span>
        <div class="dot"></div>
        <div class="clear-btn" onclick="clearInfinity()">REINITIALISER LE FIL</div>
    </div>
</header>

<div id="chat-scroller"></div>

<div id="vocal-overlay">
    <div class="orb" id="orb"></div>
    <h1 id="v-txt" style="margin-top: 50px; font-weight: 200;">Écoute en cours...</h1>
    <button class="btn" onclick="closeVocal()" style="margin-top: 40px; color: var(--error)">[ ANNULER ]</button>
</div>

<div id="footer">
    <div id="attachment-tray"></div>
    <div class="input-container">
        <input type="file" id="file-in" hidden multiple onchange="handleFiles(this)">
        <button class="btn" onclick="document.getElementById('file-in').click()">📎</button>
        <button class="btn" onclick="openVocal()">🎙️</button>
        <textarea id="q" placeholder="Posez une question à IXA..." rows="1" oninput="resizeIn(this)"></textarea>
        <button class="btn btn-send" onclick="execute()">▲</button>
    </div>
</div>

<script>
    /** * IXA INFINITY CORE v10
     * Système anti-effacement et Switch de modèle automatique
     */
    const CORE = {
        key: localStorage.getItem('ixa_v8_key') || "",
        history: JSON.parse(localStorage.getItem('ixa_infinity_history')) || [],
        tempFiles: [],
        models: ["llama-3.3-70b-versatile", "llama-3.1-8b-instant", "mixtral-8x7b-32768"],
        activeModel: ""
    };

    async function boot() {
        if (!CORE.key) {
            try {
                const r = await fetch('config.json');
                const d = await r.json();
                CORE.key = d.groq_api_key;
                localStorage.setItem('ixa_v8_key', CORE.key);
            } catch(e) {}
        }
        renderHistory();
        
        document.getElementById('q').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                execute();
            }
        });
    }

    // --- LE SWITCH AUTOMATIQUE ---
    async function callGroq(messages) {
        const activeKey = localStorage.getItem('ixa_v8_key');
        
        async function tryRequest(modelIndex) {
            if (modelIndex >= CORE.models.length) {
                throw new Error("Saturation totale de l'API. Réessayez dans 2 minutes.");
            }

            const model = CORE.models[modelIndex];
            updateBadge(model);

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${activeKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: "system", content: "Tu es IXA, une IA de type Claude 3.5. Ton mode est INFINI : tu dois te souvenir du contexte précédent. Sois précis." },
                        ...messages.map(m => ({ role: m.role, content: m.raw || m.content }))
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();

            // GESTION DU RATE LIMIT (429) -> SWITCH
            if (response.status === 429) {
                console.warn(`SWITCH : ${model} est saturé. Passage au suivant...`);
                return tryRequest(modelIndex + 1);
            }

            if (!response.ok) throw new Error(data.error?.message || "Erreur Inconnue");

            return data.choices[0].message.content;
        }

        return tryRequest(0);
    }

    // --- EXECUTION ---
    async function execute(ovr = null) {
        const input = document.getElementById('q');
        const text = ovr || input.value.trim();
        
        if (!text && CORE.tempFiles.length === 0) return;

        // Visuel (Claude Style)
        let visual = text;
        if (CORE.tempFiles.length > 0) {
            const filesHtml = CORE.tempFiles.map(f => `<div class="file-entry">📄 ${f.name}</div>`).join('');
            visual = (text ? `<p>${text}</p>` : "") + filesHtml;
        }

        addBubble('user', visual);
        input.value = ""; resizeIn(input);

        // Raw content pour l'IA
        let raw = text;
        if (CORE.tempFiles.length > 0) {
            raw = "[PIECES JOINTES]\n" + CORE.tempFiles.map(f => `${f.name}:\n${f.content}`).join("\n") + "\n\nQUESTION: " + text;
        }

        // Sauvegarde historique
        CORE.history.push({ role: 'user', content: visual, raw: raw });

        try {
            const reply = await callGroq(CORE.history);
            addBubble('assistant', reply);
            CORE.history.push({ role: 'assistant', content: reply });
            save();
        } catch (e) {
            addBubble('assistant', `<span style="color:var(--error)">${e.message}</span>`);
        }

        CORE.tempFiles = [];
        document.getElementById('attachment-tray').innerHTML = "";
    }

    // --- UTILS ---
    function addBubble(role, content) {
        const scroller = document.getElementById('chat-scroller');
        const box = document.createElement('div');
        box.className = `msg-box ${role}`;
        
        let html = content;
        if (content.includes('```')) {
            html = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        }
        html = html.replace(/\n/g, '<br>');

        box.innerHTML = `<div class="bubble"><b>${role === 'user' ? 'Moi' : 'IXA Infinity'}</b><div>${html}</div></div>`;
        scroller.appendChild(box);
        scroller.scrollTop = scroller.scrollHeight;
    }

    function renderHistory() {
        CORE.history.forEach(m => addBubble(m.role, m.content));
    }

    function save() {
        localStorage.setItem('ixa_infinity_history', JSON.stringify(CORE.history));
    }

    function clearInfinity() {
        if (confirm("Voulez-vous effacer tout le fil de discussion ?")) {
            localStorage.removeItem('ixa_infinity_history');
            location.reload();
        }
    }

    function handleFiles(el) {
        for (let f of el.files) {
            const r = new FileReader();
            r.onload = (e) => {
                CORE.tempFiles.push({ name: f.name, content: e.target.result });
                document.getElementById('attachment-tray').innerHTML += `<div class="tag">📄 ${f.name}</div>`;
            };
            r.readAsText(f);
        }
    }

    function resizeIn(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function updateBadge(m) { document.getElementById('model-name').textContent = m.split('-')[0].toUpperCase(); }

    // --- VOCAL ---
    const rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let sRec = rec ? new rec() : null;
    if (sRec) sRec.lang = 'fr-FR';

    function openVocal() {
        if (!sRec) return alert("Vocal non supporté.");
        document.getElementById('vocal-overlay').style.display = 'flex';
        document.getElementById('orb').classList.add('pulse');
        sRec.start();
        sRec.onresult = async (e) => {
            const t = e.results[0][0].transcript;
            closeVocal();
            await execute(t);
        };
    }
    function closeVocal() {
        document.getElementById('vocal-overlay').style.display = 'none';
        sRec.stop();
    }

    boot();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Intelligence Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg:#0c0c0f; --c1:#111115; --c2:#18181e; --c3:#1f1f27;
            --ln:#23232c; --g:#a8ff3e; --b:#3eb8ff; --tx:#eeeef4; --t2:#6e6e82;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--tx); font-family:'Geist', sans-serif; display:flex; height:100vh; overflow:hidden; }

        /* Barre Latérale : Conversations */
        aside#sidebar { width: 260px; background: var(--c1); border-right: 1px solid var(--ln); display: flex; flex-direction: column; padding: 15px; }
        .new-chat { border: 1px dashed var(--t2); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .new-chat:hover { border-color: var(--g); color: var(--g); }
        #history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .hist-item { padding: 10px; border-radius: 6px; background: var(--c2); cursor: pointer; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .hist-item:hover { border-color: var(--ln); }
        .btn-cfg { margin-top: auto; padding: 10px; background: none; border: 1px solid var(--ln); color: var(--t2); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Zone Principale */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        nav#tabs { display: flex; background: var(--c1); border-bottom: 1px solid var(--ln); }
        nav#tabs button { flex: 1; padding: 15px; background: none; border: none; color: var(--t2); cursor: pointer; font-weight: 500; }
        nav#tabs button.active { color: var(--g); border-bottom: 2px solid var(--g); }

        .view { display: none; flex: 1; flex-direction: column; padding: 20px; overflow: hidden; }
        .view.active { display: flex; }

        /* Chat & Messages */
        #chat-flow { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--b); color: #000; }
        .assistant { align-self: flex-start; background: var(--c3); border: 1px solid var(--ln); }
        .img-result { width: 100%; border-radius: 8px; margin-top: 10px; }

        /* Input Bar */
        .input-area { display: flex; gap: 10px; background: var(--c2); padding: 12px; border-radius: 12px; border: 1px solid var(--ln); align-items: center; }
        .input-area input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 14px; }
        .icon-btn { background: none; border: none; color: var(--t2); cursor: pointer; font-size: 1.2em; }
        .icon-btn:hover { color: var(--g); }

        /* Voix */
        #view-voice { align-items: center; justify-content: center; text-align: center; }
        .orb { width: 120px; height: 120px; background: var(--g); border-radius: 50%; filter: blur(15px); opacity: 0.4; margin-bottom: 20px; transition: 0.3s; }
        .orb.active { animation: pulse 1.5s infinite; opacity: 0.8; filter: blur(20px); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Modal Configuration */
        #modal-cfg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--c2); padding: 30px; border-radius: 15px; width: 400px; border: 1px solid var(--ln); }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0 20px; background: var(--c3); border: 1px solid var(--ln); color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="new-chat" onclick="createNewChat()">+ Nouvelle Conversation</div>
        <div id="history">
            </div>
        <button class="btn-cfg" onclick="toggleCfg(true)">⚙ Configuration</button>
    </aside>

    <main>
        <nav id="tabs">
            <button onclick="switchTab('chat')" id="tab-chat" class="active">DISCUSSION</button>
            <button onclick="switchTab('voice')" id="tab-voice">MODE VOCAL</button>
        </nav>

        <div id="view-chat" class="view active">
            <div id="chat-flow"></div>
            <div class="input-area">
                <input type="file" id="file-up" hidden onchange="handleFile(this)">
                <button class="icon-btn" onclick="document.getElementById('file-up').click()">📎</button>
                <input type="text" id="user-in" placeholder="Écrivez ou demandez une image (ex: 'Dessine...')" onkeydown="if(event.key==='Enter') send()">
                <button class="icon-btn" onclick="send()">▲</button>
            </div>
        </div>

        <div id="view-voice" class="view">
            <div class="orb" id="voice-orb"></div>
            <h2 id="v-status">Prêt à vous écouter</h2>
            <p style="color:var(--t2); margin-top:10px;">Cliquez pour démarrer la conversation fluide</p>
            <button class="btn-cfg" style="margin-top:30px; padding: 15px 30px; background:var(--g); color:black;" onclick="startVoice()">🎙 Démarrer le Micro</button>
        </div>
    </main>

    <div id="modal-cfg">
        <div class="modal-content">
            <h2 style="color:var(--g); margin-bottom:20px;">Paramètres</h2>
            <label>Clé API Groq</label>
            <input type="password" id="cfg_api">
            <label>Modèle</label>
            <select id="cfg_model">
                <option>llama-3.3-70b-versatile</option>
                <option>llama-3.1-8b-instant</option>
            </select>
            <button class="btn-cfg" style="background:var(--g); color:black; width:100%;" onclick="saveCfg()">Sauvegarder & Fermer</button>
        </div>
    </div>

<script>
    let config = { groq_api_key: "", groq_model: "llama-3.3-70b-versatile" };
    let currentChat = [];
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = SpeechRecognition ? new SpeechRecognition() : null;

    if(rec) { rec.lang = 'fr-FR'; rec.continuous = false; }

    async function init() {
        try {
            const resp = await fetch('config.json');
            if(resp.ok) {
                const data = await resp.json();
                config = {...config, ...data};
                document.getElementById('cfg_api').value = config.groq_api_key;
                document.getElementById('cfg_model').value = config.groq_model;
            }
        } catch(e) { console.warn("Fichier config.json absent."); }
        createNewChat();
    }

    // Navigation
    function switchTab(t) {
        document.querySelectorAll('.view, #tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+t).classList.add('active');
        document.getElementById('tab-'+t).classList.add('active');
    }

    function toggleCfg(show) {
        document.getElementById('modal-cfg').style.display = show ? 'flex' : 'none';
    }

    // Gestion Chat
    function createNewChat() {
        currentChat = [];
        document.getElementById('chat-flow').innerHTML = '';
        const id = Date.now();
        const item = document.createElement('div');
        item.className = 'hist-item';
        item.textContent = "Chat " + new Date().toLocaleTimeString();
        document.getElementById('history').prepend(item);
        appendMsg('assistant', "Bonjour, je suis IXA. Comment puis-je vous aider ?");
    }

    function appendMsg(role, content, isImg = false) {
        const flow = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        if(isImg) {
            d.innerHTML = `<img src="${content}" class="img-result">`;
        } else {
            d.textContent = content;
        }
        flow.appendChild(d);
        flow.scrollTop = flow.scrollHeight;
    }

    // Logique IA & Image
    async function send(override = null) {
        const input = document.getElementById('user-in');
        const val = override || input.value.trim();
        if(!val) return;

        appendMsg('user', val);
        input.value = '';

        // Détection Image
        const triggerImg = ["dessine", "génère une image", "image de", "crée un visuel"];
        if(triggerImg.some(t => val.toLowerCase().includes(t))) {
            const prompt = encodeURIComponent(val);
            const url = `https://pollinations.ai/p/${prompt}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
            appendMsg('assistant', url, true);
            return;
        }

        // Appel Groq
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${config.groq_api_key}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: config.groq_model,
                    messages: [{role: "system", content: "Tu es IXA, IA directe et efficace. Réponds en français."}, {role: "user", content: val}]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            appendMsg('assistant', reply);
            return reply;
        } catch(e) {
            appendMsg('assistant', "Erreur : Vérifiez votre clé API dans les paramètres.");
        }
    }

    // Analyse Document
    async function handleFile(input) {
        const file = input.files[0];
        if(!file) return;
        appendMsg('assistant', `Lecture du document : ${file.name}...`);
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const text = e.target.result;
            send(`Analyse ce contenu de fichier (${file.name}) et résume-le : \n\n ${text.substring(0, 4000)}`);
        };
        reader.readAsText(file);
    }

    // Voix
    function startVoice() {
        if(!rec) return alert("Microphone non supporté");
        document.getElementById('voice-orb').classList.add('active');
        document.getElementById('v-status').textContent = "Je vous écoute...";
        rec.start();
    }

    if(rec) {
        rec.onresult = async (e) => {
            const speech = e.results[0][0].transcript;
            document.getElementById('v-status').textContent = "Analyse...";
            const reply = await send(speech);
            if(reply) speak(reply);
        };
        rec.onend = () => document.getElementById('voice-orb').classList.remove('active');
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        u.onstart = () => {
            document.getElementById('v-status').textContent = "IXA vous répond...";
            document.getElementById('voice-orb').classList.add('active');
        };
        u.onend = () => {
            document.getElementById('v-status').textContent = "Prêt à vous écouter";
            document.getElementById('voice-orb').classList.remove('active');
        };
        synth.speak(u);
    }

    function saveCfg() {
        config.groq_api_key = document.getElementById('cfg_api').value;
        config.groq_model = document.getElementById('cfg_model').value;
        toggleCfg(false);
    }

    init();
</script>
</body>
</html>

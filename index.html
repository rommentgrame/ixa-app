<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Système Intégré</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --sidebar: #0f0f12; --card: #18181b;
            --accent: #a8ff3e; --text: #ececec; --text-muted: #71717a;
            --border: #27272a; --user-msg: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR : Conversations à gauche */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .new-btn { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        #history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .hist-item { padding: 10px; border-radius: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-item:hover { background: var(--card); color: var(--text); }
        
        /* Bouton Config en bas à gauche */
        #cfg-trigger { margin-top: auto; padding: 10px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; text-align: left; border-top: 1px solid var(--border); padding-top: 15px; }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at 50% 0%, #1c1c21 0%, #09090b 70%); }
        header { padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; gap: 25px; }
        .nav-tabs span { cursor: pointer; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); position: relative; padding-bottom: 5px; }
        .nav-tabs span.active { color: var(--accent); }
        .nav-tabs span.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--accent); }

        /* CHAT FLOW */
        #chat-flow { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 0.95rem; }
        .msg.user { align-self: flex-end; background: var(--user-msg); padding: 12px 18px; border-radius: 18px 18px 2px 18px; border: 1px solid var(--border); }
        .msg.assistant { align-self: flex-start; }
        .msg b { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* INPUT AREA */
        #bottom-bar { padding: 20px 15%; }
        #file-tray { display: flex; gap: 10px; margin-bottom: 10px; }
        .file-pill { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; }

        .input-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .input-container input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 1rem; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }

        /* VOICE */
        #voice-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .orb { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; transition: 0.3s; box-shadow: 0 0 30px rgba(168, 255, 62, 0.3); }
        .orb.active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-btn" onclick="location.reload()">+ Nouveau Chat</button>
    <div id="history">
        <div class="hist-item">Conversation IXA...</div>
    </div>
    <div id="cfg-trigger">⚙ IXA v3.0 Stable</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span class="active" id="t-chat" onclick="setMode('chat')">Assistant</span>
            <span id="t-voice" onclick="setMode('voice')">Vocal</span>
        </div>
        <div style="font-size: 0.8rem; color: var(--accent);">STATUS : CONNECTÉ</div>
    </header>

    <div id="chat-flow"></div>

    <div id="voice-overlay">
        <div class="orb" id="orb"></div>
        <h2 id="v-status" style="margin-top: 30px;">Prêt à vous écouter</h2>
        <button class="new-btn" style="margin-top: 20px; padding: 10px 40px;" onclick="startVoice()">Parler</button>
    </div>

    <div id="bottom-bar">
        <div id="file-tray"></div>
        <div class="input-container">
            <input type="file" id="f-hidden" hidden multiple onchange="handleFiles(this)">
            <button class="btn-icon" onclick="document.getElementById('f-hidden').click()">📎</button>
            <input type="text" id="user-input" placeholder="Message ou analyse..." onkeydown="if(event.key==='Enter') execute()">
            <button class="btn-icon" style="color: var(--accent);" onclick="execute()">▲</button>
        </div>
    </div>
</main>

<script>
    let _KEY = "";
    let _MODEL = "llama-3.3-70b-versatile";
    let _FILES = [];

    // CHARGEMENT AUTOMATIQUE DE LA CONFIG
    async function init() {
        const files = ['config.json', 'config (1).json'];
        for (let f of files) {
            try {
                const r = await fetch(f);
                if (r.ok) {
                    const data = await r.json();
                    _KEY = data.groq_api_key;
                    _MODEL = data.groq_model || _MODEL;
                    console.log("IXA : Clé chargée.");
                    break;
                }
            } catch (e) {}
        }
        appendMsg('assistant', "Système IXA v3 prêt. Clé API chargée depuis config.json.");
    }

    function handleFiles(input) {
        for (let f of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                _FILES.push({name: f.name, content: e.target.result});
                document.getElementById('file-tray').innerHTML += `<div class="file-pill">${f.name}</div>`;
            };
            reader.readAsText(f);
        }
    }

    async function execute(textOverride = null) {
        const input = document.getElementById('user-input');
        const text = textOverride || input.value.trim();
        if(!text && _FILES.length === 0) return;

        appendMsg('user', text || "Analyse de documents...");
        input.value = "";

        let prompt = text;
        if(_FILES.length > 0) {
            prompt += "\n\nCONTENU DES DOCUMENTS :\n" + _FILES.map(f => `[${f.name}]: ${f.content}`).join("\n");
        }

        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + _KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: _MODEL,
                    messages: [{role: "system", content: "Tu es IXA. Réponds en français de manière concise."}, {role: "user", content: prompt}]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            appendMsg('assistant', reply);
            _FILES = []; document.getElementById('file-tray').innerHTML = "";
            return reply;
        } catch (e) {
            appendMsg('assistant', "Erreur API : Vérifiez votre fichier config.json.");
        }
    }

    function appendMsg(role, content) {
        const flow = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerHTML = `<b>${role==='user'?'Vous':'IXA'}</b><div>${content}</div>`;
        flow.appendChild(d);
        flow.scrollTop = flow.scrollHeight;
    }

    // VOCAL
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'fr-FR';

    function startVoice() {
        document.getElementById('orb').classList.add('active');
        document.getElementById('v-status').textContent = "Écoute...";
        recognition.start();
        recognition.onresult = async (e) => {
            const rep = await execute(e.results[0][0].transcript);
            if(rep) speak(rep);
        };
        recognition.onend = () => document.getElementById('orb').classList.remove('active');
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'fr-FR';
        u.onstart = () => document.getElementById('v-status').textContent = "IXA parle...";
        u.onend = () => document.getElementById('v-status').textContent = "Prêt à écouter";
        window.speechSynthesis.speak(u);
    }

    function setMode(m) {
        document.getElementById('chat-flow').style.display = m==='chat'?'flex':'none';
        document.getElementById('bottom-bar').style.display = m==='chat'?'block':'none';
        document.getElementById('voice-overlay').style.display = m==='voice'?'flex':'none';
        document.querySelectorAll('.nav-tabs span').forEach(s => s.classList.remove('active'));
        document.getElementById('t-'+m).classList.add('active');
    }

    init();
</script>
</body>
</html>

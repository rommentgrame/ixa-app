<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA — Intelligence Personnelle</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --sidebar: #121215;
            --card: #18181b;
            --border: #27272a;
            --accent: #a8ff3e;
            --accent-muted: rgba(168, 255, 62, 0.1);
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --user-msg: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Style */
        aside#settings {
            width: 320px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        
        /* Main Chat Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: radial-gradient(circle at top center, var(--accent-muted), transparent 40%);
        }

        header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Messages */
        .message {
            max-width: 85%;
            padding: 16px;
            border-radius: 12px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: var(--text);
            border-bottom-right-radius: 2px;
        }

        .assistant {
            align-self: flex-start;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 2px;
            width: 100%;
        }

        /* Markdown Styling */
        .assistant code { font-family: 'Fira Code', monospace; background: #000; padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
        .assistant pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border); }
        .assistant table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .assistant th, .assistant td { border: 1px solid var(--border); padding: 8px; text-align: left; }

        /* Input Area */
        .input-wrapper {
            padding: 20px 40px;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input#input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 12px;
            font-size: 15px;
            outline: none;
        }

        button#send {
            background: var(--accent);
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        button#send:hover { transform: scale(1.05); background: #c1ff7a; }

        /* Settings components */
        .field-group { margin-bottom: 20px; }
        label { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field-group input, .field-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading-dots { display: none; color: var(--accent); font-size: 14px; margin-left: 20px; }
    </style>
</head>
<body>

<aside id="settings">
    <div class="sidebar-header">
        <i data-lucide="settings"></i>
        <h2 style="font-size: 1.2rem;">Configuration</h2>
    </div>
    <div class="sidebar-content">
        <div class="field-group">
            <label>Clé API Groq</label>
            <input type="password" id="cfg_api" placeholder="gsk_..." />
        </div>
        <div class="field-group">
            <label>Modèle AI</label>
            <select id="cfg_model">
                <option>llama-3.3-70b-versatile</option>
                <option>llama-3.1-8b-instant</option>
                <option>mixtral-8x7b-32768</option>
            </select>
        </div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">
        <div class="field-group">
            <label>Dépôt GitHub (user/repo)</label>
            <input type="text" id="cfg_repo" />
        </div>
        <div class="field-group">
            <label>Token GitHub</label>
            <input type="password" id="cfg_ghtoken" />
        </div>
        <button id="savecfg" class="btn-primary">Sauvegarder</button>
        <p style="margin-top:15px; font-size:11px; color: var(--text-muted); line-height:1.4;">
            Tes réglages sont synchronisés via GitHub pour servir de base de données persistante.
        </p>
    </div>
</aside>

<main>
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%;"></div>
            <strong style="letter-spacing: 1px;">IXA v3.0</strong>
        </div>
        <div id="status" class="loading-dots">IXA analyse votre requête...</div>
        <div style="color: var(--text-muted); font-size: 12px;">Mode Cloud Groq</div>
    </header>

    <div id="chat-container">
        <div class="message assistant">
            Bonjour ! Je suis <strong>IXA</strong>. Comment puis-je vous aider aujourd'hui ?
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <i data-lucide="sparkles" style="color: var(--accent); width: 20px;"></i>
            <input id="input" placeholder="Posez-moi n'importe quelle question..." autocomplete="off" />
            <button id="send"><i data-lucide="arrow-up"></i></button>
        </div>
    </div>
</main>

<script>
    // Configuration & State
    let config = {
        groq_api_key: "",
        groq_model: "llama-3.3-70b-versatile",
        github_repo: "",
        github_path: "config.json",
        github_token: ""
    };

    // Initialisation
    async function init() {
        lucide.createIcons();
        marked.setOptions({
            highlight: function(code, lang) {
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });
        await loadConfig();
    }

    async function loadConfig() {
        try {
            const resp = await fetch('config.json');
            if (resp.ok) config = await resp.json();
        } catch (e) { console.warn('Config locale non trouvée'); }
        
        await loadRemoteConfig();
        fillForm();
    }

    function fillForm() {
        document.getElementById('cfg_api').value = config.groq_api_key || '';
        document.getElementById('cfg_model').value = config.groq_model || '';
        document.getElementById('cfg_repo').value = config.github_repo || '';
        document.getElementById('cfg_ghtoken').value = config.github_token || '';
    }

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        
        if (role === 'assistant') {
            div.innerHTML = marked.parse(text);
            div.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
        } else {
            div.textContent = text;
        }
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('input');
        const status = document.getElementById('status');
        const message = input.value.trim();
        
        if (!message || !config.groq_api_key) {
            if(!config.groq_api_key) alert("Veuillez configurer votre clé API Groq");
            return;
        }

        appendMessage('user', message);
        input.value = '';
        status.style.display = 'block';

        try {
            const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + config.groq_api_key
                },
                body: JSON.stringify({
                    model: config.groq_model,
                    messages: [
                        { role: 'system', content: 'Tu es IXA, une IA avancée. Réponds en Markdown. Sois concis, élégant et expert.' },
                        { role: 'user', content: message }
                    ],
                    temperature: 0.7
                })
            });

            const data = await resp.json();
            status.style.display = 'none';

            if (data.error) throw new Error(data.error.message);
            
            const reply = data.choices[0].message.content;
            appendMessage('assistant', reply);

        } catch (err) {
            status.style.display = 'none';
            appendMessage('assistant', '⚠️ **Erreur** : ' + err.message);
        }
    }

    // GitHub Remote Sync
    async function loadRemoteConfig() {
        if (!config.github_repo || !config.github_token) return;
        try {
            let url = `https://api.github.com/repos/${config.github_repo}/contents/${config.github_path}`;
            let resp = await fetch(url, { headers: { Authorization: 'token ' + config.github_token } });
            if (resp.ok) {
                let data = await resp.json();
                let remote = JSON.parse(atob(data.content));
                Object.assign(config, remote);
            }
        } catch (e) { console.error('Erreur Sync GitHub'); }
    }

    async function storeSettings() {
        config.groq_api_key = document.getElementById('cfg_api').value.trim();
        config.groq_model   = document.getElementById('cfg_model').value;
        config.github_repo  = document.getElementById('cfg_repo').value.trim();
        config.github_token = document.getElementById('cfg_ghtoken').value.trim();

        if (config.github_repo && config.github_token) {
            try {
                let url = `https://api.github.com/repos/${config.github_repo}/contents/${config.github_path}`;
                let sha = '';
                let check = await fetch(url, { headers: { Authorization: 'token ' + config.github_token } });
                if (check.ok) { let js = await check.json(); sha = js.sha; }

                let put = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: 'token ' + config.github_token },
                    body: JSON.stringify({
                        message: 'Update IXA Config',
                        content: btoa(JSON.stringify(config, null, 2)),
                        sha: sha
                    })
                });
                if (put.ok) alert('✅ Config synchronisée sur GitHub');
            } catch (e) { alert('Erreur GitHub: ' + e.message); }
        } else {
            alert('Config mise à jour localement.');
        }
    }

    // Events
    document.getElementById('send').addEventListener('click', sendMessage);
    document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('savecfg').addEventListener('click', storeSettings);

    init();
</script>
</body>
</html>

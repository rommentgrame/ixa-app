<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Ultimate AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --sidebar: #121215; --card: #1c1c21;
            --accent: #a8ff3e; --text: #fafafa; --text-muted: #a1a1aa;
            --border: #27272a; --user-msg: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: all 0.3s ease; }
        .new-chat-btn { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 25px; transition: 0.2s; }
        .new-chat-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        #history-list { flex: 1; overflow-y: auto; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .history-item:hover { background: var(--card); color: var(--text); }
        .cfg-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; justify-content: center; }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top right, #1a1a1e, #09090b); }
        header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .tab-group { display: flex; gap: 20px; }
        .tab { background: none; border: none; color: var(--text-muted); cursor: pointer; font-weight: 500; font-size: 0.95rem; padding-bottom: 5px; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* CHAT AREA */
        #chat-container { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 25px; }
        .message { max-width: 85%; line-height: 1.6; font-size: 0.95rem; }
        .message.user { align-self: flex-end; background: var(--user-msg); padding: 15px 20px; border-radius: 18px 18px 2px 18px; border: 1px solid var(--border); }
        .message.assistant { align-self: flex-start; }
        .msg-header { font-weight: 600; font-size: 0.8rem; margin-bottom: 8px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* INPUT AREA & ATTACHMENTS */
        #input-wrapper { padding: 20px 15%; background: linear-gradient(transparent, var(--bg)); }
        #attachment-area { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .file-chip { background: var(--card); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .file-chip span { color: var(--accent); cursor: pointer; }

        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 1rem; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .action-btn:hover { color: var(--accent); }

        /* MODAL CONFIG */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal { background: var(--sidebar); border: 1px solid var(--border); width: 450px; padding: 30px; border-radius: 20px; }
        .modal h2 { margin-bottom: 20px; color: var(--accent); }
        .modal label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.8rem; }
        .modal input, .modal select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 20px; }

        /* VOICE ORB */
        #voice-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .orb { width: 150px; height: 150px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 50px rgba(168, 255, 62, 0.3); transition: 0.3s; }
        .orb.listening { animation: breathe 1.5s infinite ease-in-out; background: #fff; }
        @keyframes breathe { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,255,255,0.2); } 50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255,255,255,0.5); } 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,255,255,0.2); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-chat-btn" onclick="resetChat()">+ Nouveau Chat</button>
    <div id="history-list"></div>
    <button class="cfg-btn" onclick="openConfig()">⚙ Configuration</button>
</aside>

<main>
    <header>
        <div class="tab-group">
            <button class="tab active" id="tab-chat" onclick="setTab('chat')">Assistant</button>
            <button class="tab" id="tab-voice" onclick="setTab('voice')">Mode Vocal</button>
        </div>
        <div style="font-weight: 600; color: var(--accent);">IXA v3</div>
    </header>

    <div id="chat-container"></div>
    
    <div id="voice-view">
        <div class="orb" id="voice-orb"></div>
        <h2 id="voice-text" style="margin-top: 30px;">Cliquez pour parler</h2>
        <button class="new-chat-btn" style="margin-top: 20px;" onclick="toggleVoice()">Démarrer</button>
    </div>

    <div id="input-wrapper">
        <div id="attachment-area"></div>
        <div class="input-box">
            <input type="file" id="file-input" hidden multiple onchange="handleFiles(this)">
            <button class="action-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="main-input" placeholder="Message à IXA..." onkeydown="if(event.key==='Enter') processInput()">
            <button class="action-btn" style="color: var(--accent)" onclick="processInput()">▲</button>
        </div>
    </div>
</main>

<div id="modal-overlay">
    <div class="modal">
        <h2>Paramètres IXA</h2>
        <label>CLÉ API GROQ</label>
        <input type="password" id="cfg-api">
        <label>MODÈLE PRÉFÉRÉ</label>
        <select id="cfg-model">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Puissant)</option>
            <option value="llama-3.1-8b-instant">Llama 3.1 8B (Rapide)</option>
        </select>
        <button class="new-chat-btn" style="width: 100%" onclick="saveConfig()">Appliquer</button>
    </div>
</div>

<script>
    let config = { api_key: "", model: "llama-3.3-70b-versatile" };
    let attachedFiles = [];
    let isSpeaking = false;

    // --- INITIALISATION ---
    async function init() {
        try {
            const r = await fetch('config (1).json');
            const data = await r.json();
            config.api_key = data.groq_api_key;
            config.model = data.groq_model;
            document.getElementById('cfg-api').value = config.api_key;
            document.getElementById('cfg-model').value = config.model;
        } catch(e) { console.log("Config locale non trouvée"); }
        resetChat();
    }

    // --- GESTION INTERFACE ---
    function setTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+type).classList.add('active');
        if(type === 'voice') {
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('input-wrapper').style.display = 'none';
            document.getElementById('voice-view').style.display = 'flex';
        } else {
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('input-wrapper').style.display = 'block';
            document.getElementById('voice-view').style.display = 'none';
        }
    }

    function openConfig() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function saveConfig() {
        config.api_key = document.getElementById('cfg-api').value;
        config.model = document.getElementById('cfg-model').value;
        document.getElementById('modal-overlay').style.display = 'none';
    }

    // --- GESTION FICHIERS ---
    function handleFiles(input) {
        for(let f of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const fileObj = { name: f.name, content: e.target.result };
                attachedFiles.push(fileObj);
                renderChips();
            };
            reader.readAsText(f);
        }
    }

    function renderChips() {
        const area = document.getElementById('attachment-area');
        area.innerHTML = attachedFiles.map((f, i) => `
            <div class="file-chip">📄 ${f.name} <span onclick="removeFile(${i})">✕</span></div>
        `).join('');
    }

    function removeFile(i) { attachedFiles.splice(i, 1); renderChips(); }

    // --- LOGIQUE CHAT ---
    async function processInput(overrideText = null) {
        const input = document.getElementById('main-input');
        const text = overrideText || input.value.trim();
        if(!text && attachedFiles.length === 0) return;

        appendMessage('user', text);
        input.value = "";

        // Préparation du prompt avec fichiers
        let fullPrompt = text;
        if(attachedFiles.length > 0) {
            fullPrompt += "\n\nDocuments joints :\n" + attachedFiles.map(f => `[${f.name}]: ${f.content}`).join("\n");
        }

        // Détection Image
        if(text.toLowerCase().includes("dessine") || text.toLowerCase().includes("génère une image")) {
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
            appendMessage('assistant', `<img src="${imgUrl}" style="width:100%; border-radius:10px; margin-top:10px;">`);
            attachedFiles = []; renderChips();
            return;
        }

        try {
            const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${config.api_key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: config.model,
                    messages: [{role: "system", content: "Tu es IXA, une IA supérieure. Réponds en français de façon concise."}, {role: "user", content: fullPrompt}]
                })
            });
            const data = await resp.json();
            const reply = data.choices[0].message.content;
            appendMessage('assistant', reply);
            attachedFiles = []; renderChips();
            return reply;
        } catch(e) {
            appendMessage('assistant', "Erreur de connexion. Vérifiez votre clé API.");
        }
    }

    function appendMessage(role, content) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `<div class="msg-header">${role === 'user' ? 'Vous' : 'IXA'}</div><div>${content}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function resetChat() {
        document.getElementById('chat-container').innerHTML = '';
        appendMessage('assistant', 'Système IXA v3 initialisé. Prêt pour vos requêtes.');
    }

    // --- LOGIQUE VOCALE (STT & TTS) ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'fr-FR';

    async function toggleVoice() {
        const orb = document.getElementById('voice-orb');
        const status = document.getElementById('voice-text');
        
        status.textContent = "Je vous écoute...";
        orb.classList.add('listening');
        recognition.start();

        recognition.onresult = async (event) => {
            const speechText = event.results[0][0].transcript;
            status.textContent = "Analyse : " + speechText;
            const reply = await processInput(speechText);
            speak(reply);
        };

        recognition.onend = () => orb.classList.remove('listening');
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'fr-FR';
        utter.rate = 1.1;
        utter.onstart = () => document.getElementById('voice-text').textContent = "IXA parle...";
        utter.onend = () => document.getElementById('voice-text').textContent = "Cliquez pour parler";
        synth.speak(utter);
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v4 — Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --sidebar: #0f0f12; --card: #18181b;
            --accent: #a8ff3e; --text: #ececec; --text-muted: #71717a;
            --border: #27272a; --user-msg: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR & HISTORIQUE */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .new-chat { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-bottom: 25px; }
        #history-list { flex: 1; overflow-y: auto; }
        .hist-item { padding: 10px; border-radius: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; }
        .hist-item:hover, .hist-item.active { background: var(--card); color: var(--text); }
        .delete-chat { opacity: 0; color: #ff4444; }
        .hist-item:hover .delete-chat { opacity: 1; }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top, #1c1c21, #09090b); }
        header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs span { cursor: pointer; font-size: 0.9rem; color: var(--text-muted); margin-right: 20px; font-weight: 500; }
        .nav-tabs span.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 25px; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 0.98rem; }
        .msg.user { align-self: flex-end; background: var(--user-msg); padding: 12px 18px; border-radius: 18px 18px 2px 18px; border: 1px solid var(--border); }
        .msg.assistant { align-self: flex-start; }
        .msg b { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; }

        /* FILE CLAUDE STYLE */
        .file-card { display: flex; align-items: center; gap: 12px; background: #111115; border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; margin-top: 10px; width: fit-content; }
        .file-card .icon { color: var(--accent); font-size: 1.2rem; }
        .file-card .name { font-size: 0.85rem; font-weight: 500; }

        /* INPUT AREA */
        #input-area { padding: 20px 15%; }
        #tray { display: flex; gap: 10px; margin-bottom: 10px; }
        .pill { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; }
        .box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 1rem; }
        .btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }

        /* VOCAL */
        #voice-mode { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .orb { width: 110px; height: 110px; background: var(--accent); border-radius: 50%; filter: blur(1px); }
        .orb.active { animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--accent); } 50% { transform: scale(1.15); box-shadow: 0 0 50px var(--accent); } 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-chat" onclick="newChat()">+ Nouvelle Discussion</button>
    <div id="history-list"></div>
    <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 20px;" id="api-info">API : Recherche...</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span class="active" id="t-chat" onclick="setMode('chat')">Assistant</span>
            <span id="t-voice" onclick="setMode('voice')">Vocal</span>
        </div>
        <div style="font-weight: bold; color: var(--accent);">IXA v4</div>
    </header>

    <div id="chat-window"></div>

    <div id="voice-mode">
        <div class="orb" id="orb"></div>
        <h2 id="v-status" style="margin-top: 40px; font-weight: 400;">IXA est à votre écoute</h2>
        <button class="new-chat" style="margin-top: 25px; padding: 12px 40px" onclick="startVocal()">Lancer le micro</button>
    </div>

    <div id="input-area">
        <div id="tray"></div>
        <div class="box">
            <input type="file" id="f-in" hidden multiple onchange="handleFiles(this)">
            <button class="btn" onclick="document.getElementById('f-in').click()">📎</button>
            <input type="text" id="query" placeholder="Poser une question ou modifier un fichier..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn" style="color: var(--accent)" onclick="send()">▲</button>
        </div>
    </div>
</main>

<script>
    let _KEY = localStorage.getItem('ixa_secure_key') || "";
    let _MODEL = "llama-3.3-70b-versatile";
    let _FILES = [];
    let _HISTORY = JSON.parse(localStorage.getItem('ixa_history_v4')) || [];
    let _ACTIVE_ID = null;

    // --- INITIALISATION SÉCURISÉE ---
    async function init() {
        if (!_KEY) {
            try {
                const r = await fetch('config.json');
                const d = await r.json();
                _KEY = d.groq_api_key;
                localStorage.setItem('ixa_secure_key', _KEY);
            } catch (e) { console.log("Config locale non trouvée, en attente..."); }
        }
        document.getElementById('api-info').textContent = _KEY ? "API : ACTIVE (MÉMOIRE)" : "API : ERREUR CONFIG.JSON";
        
        if (_HISTORY.length > 0) loadChat(_HISTORY[0].id); else newChat();
        renderHistory();
    }

    // --- HISTORIQUE ---
    function newChat() {
        _ACTIVE_ID = Date.now();
        _HISTORY.unshift({ id: _ACTIVE_ID, title: "Nouvelle discussion", messages: [] });
        save(); loadChat(_ACTIVE_ID);
    }

    function loadChat(id) {
        _ACTIVE_ID = id;
        const chat = _HISTORY.find(c => c.id === id);
        document.getElementById('chat-window').innerHTML = "";
        chat.messages.forEach(m => display(m.role, m.content, false));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = _HISTORY.map(c => `
            <div class="hist-item ${c.id === _ACTIVE_ID ? 'active' : ''}" onclick="loadChat(${c.id})">
                ${c.title}
                <span class="delete-chat" onclick="deleteChat(event, ${c.id})">✕</span>
            </div>
        `).join('');
    }

    function deleteChat(e, id) {
        e.stopPropagation();
        _HISTORY = _HISTORY.filter(c => c.id !== id);
        save(); if (_HISTORY.length > 0) loadChat(_HISTORY[0].id); else newChat();
    }

    function save() { localStorage.setItem('ixa_history_v4', JSON.stringify(_HISTORY)); }

    // --- FICHIERS ---
    function handleFiles(el) {
        for (let f of el.files) {
            const r = new FileReader();
            r.onload = (e) => {
                _FILES.push({ name: f.name, content: e.target.result });
                document.getElementById('tray').innerHTML += `<div class="pill">📄 ${f.name}</div>`;
            };
            r.readAsText(f);
        }
    }

    // --- LOGIQUE CHAT ---
    async function send(override = null) {
        const i = document.getElementById('query');
        const val = override || i.value.trim();
        if (!val && _FILES.length === 0) return;

        let userDisplay = val;
        let apiContext = val;

        if (_FILES.length > 0) {
            const filesHtml = _FILES.map(f => `<div class="file-card"><span class="icon">📄</span><span class="name">${f.name}</span></div>`).join('');
            userDisplay = (val ? val + "<br>" : "") + filesHtml;
            apiContext = `[FICHIERS ATTACHÉS]\n` + _FILES.map(f => `CONTENU ${f.name}:\n${f.content}`).join("\n") + `\n\nMESSAGE: ${val}`;
        }

        display('user', userDisplay);
        i.value = "";
        
        const currentChat = _HISTORY.find(c => c.id === _ACTIVE_ID);
        if (currentChat.messages.length <= 1) currentChat.title = val.substring(0, 30);

        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: _MODEL,
                    messages: [
                        {role: "system", content: "Tu es IXA, une IA précise et élégante comme Claude. Si l'utilisateur donne des fichiers, analyse-les sans afficher leur contenu brut."},
                        ...currentChat.messages.slice(-10).map(m => ({role: m.role, content: m.raw || m.content})),
                        {role: "user", content: apiContext}
                    ]
                })
            });
            const d = await res.json();
            const rep = d.choices[0].message.content;
            display('assistant', rep, true, apiContext);
            _FILES = []; document.getElementById('tray').innerHTML = "";
            save(); renderHistory();
            return rep;
        } catch(e) { display('assistant', "Erreur API. Vérifiez config.json ou relancez."); }
    }

    function display(role, content, saveMsg = true, raw = null) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA'}</b><div>${content}</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;

        if (saveMsg) {
            _HISTORY.find(c => c.id === _ACTIVE_ID).messages.push({ role, content, raw });
        }
    }

    // --- VOCAL ---
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'fr-FR';

    function startVocal() {
        document.getElementById('orb').classList.add('active');
        document.getElementById('v-status').textContent = "Écoute en cours...";
        rec.start();
        rec.onresult = async (e) => {
            const rep = await send(e.results[0][0].transcript);
            if(rep) {
                const u = new SpeechSynthesisUtterance(rep);
                u.lang = 'fr-FR';
                u.onstart = () => document.getElementById('v-status').textContent = "IXA vous répond...";
                u.onend = () => document.getElementById('v-status').textContent = "Prêt à écouter";
                window.speechSynthesis.speak(u);
            }
        };
        rec.onend = () => document.getElementById('orb').classList.remove('active');
    }

    function setMode(m) {
        document.getElementById('chat-window').style.display = m==='chat'?'flex':'none';
        document.getElementById('input-area').style.display = m==='chat'?'block':'none';
        document.getElementById('voice-mode').style.display = m==='voice'?'flex':'none';
        document.querySelectorAll('.nav-tabs span').forEach(s => s.classList.remove('active'));
        document.getElementById('t-'+m).classList.add('active');
    }

    init();
</script>
</body>
</html>

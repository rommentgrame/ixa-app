<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0f;--c1:#111115;--c2:#18181e;--c3:#1f1f27;
  --ln:#23232c;--ln2:#2d2d38;
  --g:#a8ff3e;--b:#3eb8ff;--r:#ff4d6d;--p:#9d6bff;--o:#ffb23e;
  --tx:#eeeef4;--t2:#6e6e82;--t3:#28282f;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Geist',sans-serif;font-size:14px;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(35,35,44,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(35,35,44,.5) 1px,transparent 1px);
  background-size:44px 44px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 45% at 50% 0%,rgba(168,255,62,.05) 0%,transparent 65%)}

/* ── SIDEBAR ── */
.sb{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--c1);border-right:1px solid var(--ln);
  display:flex;flex-direction:column;z-index:20;transition:transform .22s ease}
.sb.off{transform:translateX(-220px)}
.sb-logo{padding:16px 14px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:10px}
.sb-mk{width:30px;height:30px;background:var(--g);border-radius:8px;display:grid;place-items:center;
  font-size:12px;color:#0c0c0f;font-weight:700;flex-shrink:0}
.sb-nm{font-size:15px;font-weight:600}
.sb-vr{font-family:'Geist Mono',monospace;font-size:9px;color:var(--t2);letter-spacing:1.5px;margin-top:1px}
.modes{display:flex;gap:6px;padding:10px;border-bottom:1px solid var(--ln)}
.modb{flex:1;padding:7px;border-radius:7px;border:1px solid var(--ln2);background:transparent;
  color:var(--t2);font-size:10px;font-family:'Geist Mono',monospace;text-transform:uppercase;
  letter-spacing:.5px;cursor:pointer;transition:.15s;text-align:center}
.modb:hover{color:var(--tx);border-color:var(--ln)}
.modb.on{border-color:rgba(168,255,62,.3);color:var(--g);background:rgba(168,255,62,.07)}
.modb.von{border-color:rgba(255,77,109,.3);color:var(--r);background:rgba(255,77,109,.07)}
.sb-new{margin:10px;padding:8px 12px;background:rgba(168,255,62,.09);color:var(--g);
  border:1px solid rgba(168,255,62,.22);border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:500;font-family:'Geist',sans-serif;
  display:flex;align-items:center;gap:6px;transition:.15s;width:calc(100% - 20px)}
.sb-new:hover{background:rgba(168,255,62,.15)}
.sb-sec{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--t2);padding:10px 14px 5px;text-transform:uppercase}
.cvl{flex:1;overflow-y:auto;padding:0 6px 8px}
.cvl::-webkit-scrollbar{width:2px}.cvl::-webkit-scrollbar-thumb{background:var(--ln2)}
.cvi{padding:8px 10px;border-radius:7px;cursor:pointer;transition:.12s;
  border:1px solid transparent;position:relative;margin-bottom:1px}
.cvi:hover{background:var(--c2);border-color:var(--ln)}
.cvi.on{background:rgba(168,255,62,.06);border-color:rgba(168,255,62,.18)}
.cvi-n{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2)}
.cvi.on .cvi-n{color:var(--g)}
.cvi-d{font-size:10px;color:var(--t3);margin-top:2px;font-family:'Geist Mono',monospace}
.cvi-x{position:absolute;right:7px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--t2);cursor:pointer;font-size:11px;
  opacity:0;padding:2px 4px;border-radius:4px;transition:.12s}
.cvi:hover .cvi-x{opacity:1}.cvi-x:hover{color:var(--r)}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;z-index:1;transition:margin-left .22s ease}
.main.full{margin-left:0}
.tb{height:48px;min-height:48px;display:flex;align-items:center;gap:8px;padding:0 14px;
  border-bottom:1px solid var(--ln);background:rgba(12,12,15,.92);backdrop-filter:blur(14px);z-index:5}
.tbb{width:30px;height:30px;border-radius:7px;background:none;border:1px solid var(--ln);
  color:var(--t2);cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.12s;flex-shrink:0}
.tbb:hover{border-color:var(--ln2);color:var(--tx)}.tbb.on{border-color:rgba(168,255,62,.3);color:var(--g)}
.tb-t{flex:1;font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Geist Mono',monospace}
.tb-st{display:flex;align-items:center;gap:5px;font-family:'Geist Mono',monospace;font-size:9px;
  color:var(--t2);padding:3px 9px;border:1px solid var(--ln);border-radius:20px;letter-spacing:1px}
.tb-dot{width:5px;height:5px;background:var(--g);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

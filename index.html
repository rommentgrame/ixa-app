<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Intelligence Avancée</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0d; --sidebar: #111114; --card: #1a1a1e;
            --accent: #a8ff3e; --text: #ececec; --text-muted: #8e8e93;
            --border: #2c2c31; --user-msg: #26262b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (Gestion historique) */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .new-chat { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .new-chat:hover { opacity: 0.9; }
        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 10px; border-radius: 8px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover, .chat-item.active { background: var(--card); color: var(--text); }
        .status-info { font-size: 0.75rem; color: var(--text-muted); padding-top: 10px; border-top: 1px solid var(--border); }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 500; margin-right: 20px; padding-bottom: 5px; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* CHAT AREA */
        #chat-window { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 0.95rem; }
        .msg.user { align-self: flex-end; background: var(--user-msg); padding: 12px 18px; border-radius: 18px 18px 2px 18px; border: 1px solid var(--border); }
        .msg.assistant { align-self: flex-start; }
        .msg b { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }

        /* FILE PREVIEW (Claude Style) */
        .file-attachment { display: inline-flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; margin-top: 10px; font-size: 0.85rem; }
        .file-attachment svg { width: 16px; fill: var(--accent); }

        /* INPUT */
        #input-container { padding: 20px 15%; }
        #tray { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .pill { background: var(--card); border: 1px solid var(--border); padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .pill span { cursor: pointer; color: var(--accent); font-weight: bold; }
        
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .box input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 1rem; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-icon:hover { color: var(--accent); }

        /* VOICE */
        #voice-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .orb { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; filter: blur(2px); transition: 0.4s; }
        .orb.active { animation: pulse 1.5s infinite; box-shadow: 0 0 50px var(--accent); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-chat" onclick="createNewChat()">+ Nouveau Chat</button>
    <div id="chat-list"></div>
    <div class="status-info" id="api-status">API : Déconnecté</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-chat" onclick="setMode('chat')">Assistant</button>
            <button class="tab-btn" id="tab-voice" onclick="setMode('voice')">Vocal</button>
        </div>
        <div style="font-weight: 600; letter-spacing: 1px;">IXA v3.0</div>
    </header>

    <div id="chat-window"></div>

    <div id="voice-view">
        <div class="orb" id="orb"></div>
        <h2 id="v-txt" style="margin-top: 30px; font-weight: 400;">Prêt à vous écouter</h2>
        <button class="new-chat" style="margin-top: 20px; padding: 12px 40px" onclick="startVoice()">Parler</button>
    </div>

    <div id="input-container">
        <div id="tray"></div>
        <div class="box">
            <input type="file" id="f-hidden" hidden multiple onchange="attachFiles(this)">
            <button class="btn-icon" onclick="document.getElementById('f-hidden').click()">📎</button>
            <input type="text" id="user-input" placeholder="Posez une question ou analysez un fichier..." onkeydown="if(event.key==='Enter') run()">
            <button class="btn-icon" style="color: var(--accent)" onclick="run()">▲</button>
        </div>
    </div>
</main>

<script>
    let _KEY = localStorage.getItem('ixa_key') || "";
    let _MODEL = "llama-3.3-70b-versatile";
    let _FILES = [];
    let _HISTORY = JSON.parse(localStorage.getItem('ixa_history')) || [];
    let _CURRENT_CHAT_ID = null;

    // --- INITIALISATION ---
    async function init() {
        if (!_KEY) {
            const names = ['config.json', 'config (1).json'];
            for (let name of names) {
                try {
                    const r = await fetch(name);
                    const data = await r.json();
                    _KEY = data.groq_api_key;
                    localStorage.setItem('ixa_key', _KEY);
                    break;
                } catch(e) {}
            }
        }
        document.getElementById('api-status').textContent = _KEY ? "API : Prête" : "API : Manquante";
        renderHistory();
        if (_HISTORY.length > 0) loadChat(_HISTORY[0].id); else createNewChat();
    }

    // --- GESTION HISTORIQUE ---
    function createNewChat() {
        _CURRENT_CHAT_ID = Date.now();
        const newChat = { id: _CURRENT_CHAT_ID, title: "Nouvelle discussion", messages: [] };
        _HISTORY.unshift(newChat);
        saveAndRender();
        loadChat(_CURRENT_CHAT_ID);
    }

    function loadChat(id) {
        _CURRENT_CHAT_ID = id;
        const chat = _HISTORY.find(c => c.id === id);
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        chat.messages.forEach(m => displayMsg(m.role, m.content, false));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('chat-list');
        list.innerHTML = _HISTORY.map(c => `
            <div class="chat-item ${c.id === _CURRENT_CHAT_ID ? 'active' : ''}" onclick="loadChat(${c.id})">
                ${c.title}
            </div>
        `).join('');
    }

    function saveAndRender() {
        localStorage.setItem('ixa_history', JSON.stringify(_HISTORY));
        renderHistory();
    }

    // --- GESTION FICHIERS ---
    function attachFiles(input) {
        for (let f of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                _FILES.push({ name: f.name, content: e.target.result });
                renderTray();
            };
            reader.readAsText(f);
        }
    }

    function renderTray() {
        document.getElementById('tray').innerHTML = _FILES.map((f, i) => `
            <div class="pill">📄 ${f.name} <span onclick="removeFile(${i})">✕</span></div>
        `).join('');
    }
    function removeFile(i) { _FILES.splice(i, 1); renderTray(); }

    // --- LOGIQUE CHAT ---
    async function run(override = null) {
        const input = document.getElementById('user-input');
        const text = override || input.value.trim();
        if (!text && _FILES.length === 0) return;

        let displayContent = text;
        let apiContent = text;

        // Si fichiers, on crée le bloc visuel style Claude
        if (_FILES.length > 0) {
            const fileBlocks = _FILES.map(f => `
                <div class="file-attachment">
                    <svg viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/></svg>
                    ${f.name}
                </div>
            `).join('');
            displayContent = (text ? text + "<br>" : "") + fileBlocks;
            apiContent = `[Documents joints: ${_FILES.map(f => f.name).join(', ')}]\n` + 
                         _FILES.map(f => `CONTENU ${f.name}:\n${f.content}`).join("\n") + 
                         `--- QUESTION UTILISATEUR ---\n${text}`;
        }

        displayMsg('user', displayContent);
        input.value = "";
        
        // Mise à jour titre si premier message
        const currentChat = _HISTORY.find(c => c.id === _CURRENT_CHAT_ID);
        if (currentChat.messages.length <= 1) currentChat.title = text.substring(0, 25);

        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: _MODEL,
                    messages: [
                        {role: "system", content: "Tu es IXA, une IA analytique supérieure. Réponds avec la clarté et la profondeur de Claude. Si des documents sont fournis, utilise-les pour étayer tes réponses."},
                        ...currentChat.messages.map(m => ({role: m.role, content: m.rawContent || m.content})),
                        {role: "user", content: apiContent}
                    ]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            displayMsg('assistant', reply, true, apiContent);
            _FILES = []; renderTray();
            saveAndRender();
            return reply;
        } catch(e) {
            displayMsg('assistant', "Erreur de connexion. Vérifiez config.json.");
        }
    }

    function displayMsg(role, content, save = true, raw = null) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA'}</b><div>${content}</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;

        if (save) {
            const chat = _HISTORY.find(c => c.id === _CURRENT_CHAT_ID);
            chat.messages.push({ role, content, rawContent: raw });
            saveAndRender();
        }
    }

    // --- VOCAL ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'fr-FR';

    function startVoice() {
        document.getElementById('orb').classList.add('active');
        document.getElementById('v-txt').textContent = "Écoute...";
        recognition.start();
        recognition.onresult = async (e) => {
            const speech = e.results[0][0].transcript;
            const reply = await run(speech);
            if(reply) speak(reply);
        };
        recognition.onend = () => document.getElementById('orb').classList.remove('active');
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'fr-FR';
        u.onstart = () => document.getElementById('v-txt').textContent = "IXA parle...";
        u.onend = () => document.getElementById('v-txt').textContent = "Prêt à écouter";
        window.speechSynthesis.speak(u);
    }

    function setMode(m) {
        document.getElementById('chat-window').style.display = m==='chat'?'flex':'none';
        document.getElementById('input-container').style.display = m==='chat'?'block':'none';
        document.getElementById('voice-view').style.display = m==='voice'?'flex':'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+m).classList.add('active');
    }

    init();
</script>
</body>
</html>

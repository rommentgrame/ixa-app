<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Système Privé</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --sidebar: #0f0f12; --card: #18181b;
            --accent: #a8ff3e; --text: #ececec; --text-muted: #71717a;
            --border: #27272a; --user-msg: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .new-btn { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        #history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .hist-card { padding: 10px; border-radius: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-card:hover { background: var(--card); color: var(--text); }
        .status-tag { font-size: 0.7rem; color: var(--accent); opacity: 0.6; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at 50% 0%, #1c1c21 0%, #09090b 70%); }
        header { padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; gap: 25px; }
        .nav-tabs span { cursor: pointer; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); position: relative; padding-bottom: 5px; }
        .nav-tabs span.active { color: var(--accent); }
        .nav-tabs span.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--accent); }

        /* CHAT */
        #chat-flow { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: var(--user-msg); padding: 12px 18px; border-radius: 18px 18px 2px 18px; border: 1px solid var(--border); }
        .msg.assistant { align-self: flex-start; }
        .msg b { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* INPUT */
        #bottom-bar { padding: 20px 15%; }
        #file-tray { display: flex; gap: 10px; margin-bottom: 10px; }
        .file-pill { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .file-pill span { cursor: pointer; color: #fff; }

        .input-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .input-container input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 1rem; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-icon:hover { color: var(--accent); }

        /* VOICE */
        #voice-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .visualizer { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .visualizer::before { content: ''; position: absolute; inset: -15px; border: 2px solid var(--accent); border-radius: 50%; animation: pulse 2s infinite; opacity: 0.3; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

<aside id="sidebar">
    <button class="new-btn" onclick="clearCurrentChat()">+ Nouveau Chat</button>
    <div id="history"></div>
    <div class="status-tag">IXA Core : Connecté</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span class="active" id="t-chat" onclick="setMode('chat')">Assistant</span>
            <span id="t-voice" onclick="setMode('voice')">Vocal</span>
        </div>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: var(--text-muted);">IXA V3.0</div>
    </header>

    <div id="chat-flow"></div>

    <div id="voice-overlay">
        <div class="visualizer">🎙️</div>
        <h2 id="v-info" style="margin-top: 40px;">En attente...</h2>
        <button class="new-btn" style="margin-top: 30px; padding: 12px 40px;" onclick="startListening()">Parler</button>
    </div>

    <div id="bottom-bar">
        <div id="file-tray"></div>
        <div class="input-container">
            <input type="file" id="f-hidden" hidden multiple onchange="uploadFiles(this)">
            <button class="btn-icon" onclick="document.getElementById('f-hidden').click()">📎</button>
            <input type="text" id="user-input" placeholder="Poser une question ou analyser un fichier..." onkeydown="if(event.key==='Enter') execute()">
            <button class="btn-icon" style="color: var(--accent);" onclick="execute()">▲</button>
        </div>
    </div>
</main>

<script>
    // Variables de session privées (Non accessibles via console facilement)
    let _PRIVATE_API_KEY = "";
    let _CURRENT_MODEL = "";
    let _FILES = [];
    const synth = window.speechSynthesis;

    // --- CHARGEMENT AUTO DE LA CONFIG (Sans menu) ---
    async function loadSecureConfig() {
        try {
            const response = await fetch('config (1).json');
            const data = await response.json();
            _PRIVATE_API_KEY = data.groq_api_key;
            _CURRENT_MODEL = data.groq_model || "llama-3.3-70b-versatile";
            console.log("IXA Core: Prêt");
        } catch (e) {
            appendMsg('assistant', "Erreur système : Fichier 'config (1).json' introuvable.");
        }
    }

    // --- LOGIQUE CHAT & FICHIERS ---
    function uploadFiles(input) {
        for (let f of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                _FILES.push({ name: f.name, content: e.target.result });
                renderFiles();
            };
            reader.readAsText(f);
        }
    }

    function renderFiles() {
        const tray = document.getElementById('file-tray');
        tray.innerHTML = _FILES.map((f, i) => `
            <div class="file-pill">📄 ${f.name} <span onclick="removeFile(${i})">✕</span></div>
        `).join('');
    }

    function removeFile(i) { _FILES.splice(i, 1); renderFiles(); }

    async function execute(textOverride = null) {
        const input = document.getElementById('user-input');
        const text = textOverride || input.value.trim();
        if (!text && _FILES.length === 0) return;

        appendMsg('user', text || "Analyse des documents joints...");
        input.value = "";

        // Construction du contexte
        let context = text;
        if (_FILES.length > 0) {
            context += "\n\n[SYSTÈME: Analyse ces documents fournis par l'utilisateur]\n" + 
                       _FILES.map(f => `Contenu de ${f.name}: ${f.content}`).join("\n");
        }

        // Détection Image
        if (text.toLowerCase().includes("dessine") || text.toLowerCase().includes("génère une image")) {
            const url = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
            appendMsg('assistant', `<img src="${url}" style="width:100%; border-radius:12px; margin-top:10px;">`);
            _FILES = []; renderFiles();
            return;
        }

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${_PRIVATE_API_KEY}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: _CURRENT_MODEL,
                    messages: [
                        {role: "system", content: "Tu es IXA, une IA précise. Réponds en français. Si l'utilisateur donne un fichier, analyse-le directement."},
                        {role: "user", content: context}
                    ]
                })
            });
            const data = await response.json();
            const reply = data.choices[0].message.content;
            appendMsg('assistant', reply);
            _FILES = []; renderFiles(); // Nettoyage après envoi
            return reply;
        } catch (e) {
            appendMsg('assistant', "Erreur API : Vérifiez votre clé dans config (1).json");
        }
    }

    function appendMsg(role, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA'}</b><div>${content}</div>`;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
        
        // Créer historique
        if(role === 'user' && content.length > 5) {
            const h = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'hist-card';
            item.textContent = content;
            h.prepend(item);
        }
    }

    // --- MODE VOCAL ROBUSTE ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'fr-FR';
    recognition.interimResults = false;

    function startListening() {
        const info = document.getElementById('v-info');
        info.textContent = "Je vous écoute...";
        recognition.start();

        recognition.onresult = async (e) => {
            const transcript = e.results[0][0].transcript;
            info.textContent = "Analyse : " + transcript;
            const reply = await execute(transcript);
            if(reply) speak(reply);
        };
    }

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        u.rate = 1.0;
        u.onstart = () => document.getElementById('v-info').textContent = "IXA parle...";
        u.onend = () => document.getElementById('v-info').textContent = "Prêt à écouter";
        synth.speak(u);
    }

    // --- NAVIGATION ---
    function setMode(m) {
        document.querySelectorAll('.nav-tabs span').forEach(s => s.classList.remove('active'));
        document.getElementById('t-'+m).classList.add('active');
        if(m === 'voice') {
            document.getElementById('chat-flow').style.display = 'none';
            document.getElementById('bottom-bar').style.display = 'none';
            document.getElementById('voice-overlay').style.display = 'flex';
        } else {
            document.getElementById('chat-flow').style.display = 'flex';
            document.getElementById('bottom-bar').style.display = 'block';
            document.getElementById('voice-overlay').style.display = 'none';
        }
    }

    function clearCurrentChat() {
        document.getElementById('chat-flow').innerHTML = '';
        appendMsg('assistant', 'Nouveau cycle IXA initialisé. Comment puis-je vous aider ?');
    }

    // Init
    loadSecureConfig().then(() => {
        appendMsg('assistant', 'Système IXA v3 en ligne. Sécurité API : Active.');
    });
</script>
</body>
</html>

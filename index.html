<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v8 — Intelligence Avancée</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --sidebar: #111116;
            --card: #18181f;
            --accent: #a8ff3e;
            --accent-soft: rgba(168, 255, 62, 0.1);
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --user-bubble: #27272e;
            --error: #ef4444;
            --success: #22c55e;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-new-chat {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            margin-bottom: 25px;
        }

        .btn-new-chat:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-soft);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--card);
            color: var(--text);
        }

        .chat-item.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent);
        }

        .delete-btn {
            opacity: 0;
            color: var(--error);
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .chat-item:hover .delete-btn { opacity: 1; }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, #1a1a25, #0b0b0f);
        }

        header {
            height: 70px;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 11, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-tabs { display: flex; gap: 30px; }
        .nav-tabs span {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-muted);
            position: relative;
            padding: 10px 0;
            transition: 0.3s;
        }

        .nav-tabs span.active { color: var(--accent); }
        .nav-tabs span.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            line-height: 1.7;
            font-size: 1rem;
            position: relative;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            padding: 15px 22px;
            border-radius: 20px 20px 4px 20px;
            border: 1px solid var(--border);
        }

        .message.assistant {
            align-self: flex-start;
            width: 100%;
        }

        .message b {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        /* Code Blocks */
        pre {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid var(--border);
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        /* File Preview Claude Style */
        .file-preview-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--sidebar);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .file-preview-card:hover { border-color: var(--accent); }
        .file-icon { color: var(--accent); font-size: 1.5rem; }

        /* --- INPUT AREA --- */
        #input-area {
            padding: 20px 15% 40px 15%;
            background: linear-gradient(transparent, var(--bg) 20%);
        }

        .input-wrapper {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 15px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            padding: 12px 5px;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            outline: none;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .action-btn:hover { background: var(--border); color: var(--accent); }
        .send-btn { color: var(--accent); }

        #attachment-tray {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .attachment-tag {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--accent);
        }

        /* --- VOICE MODE --- */
        #voice-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .orb-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 100px;
            height: 100px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(2px);
            z-index: 2;
        }

        .orb-wave {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0;
        }

        .listening .orb-wave {
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* --- UTILS --- */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
        .typing { font-style: italic; color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="brand">
        <div class="status-dot"></div>
        IXA SYSTEM
    </div>
    
    <button class="btn-new-chat" onclick="createNewChat()">
        <span>+</span> Nouveau Chat
    </button>

    <div id="history-list">
        </div>

    <div style="margin-top: auto; padding-top: 20px;">
        <div id="api-status-label" style="font-size: 0.75rem; color: var(--text-muted);">
            Vérification API...
        </div>
    </div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span id="tab-chat" class="active" onclick="switchMode('chat')">Assistant</span>
            <span id="tab-voice" onclick="switchMode('voice')">Mode Vocal</span>
        </div>
        <div id="model-badge" style="background: var(--card); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--border);">
            Llama 3.3 70B
        </div>
    </header>

    <div id="chat-container">
        </div>

    <div id="voice-view">
        <div class="orb-container" id="orb-box">
            <div class="orb"></div>
            <div class="orb-wave"></div>
            <div class="orb-wave" style="animation-delay: 0.5s"></div>
        </div>
        <h2 id="v-status" style="margin-top: 40px; font-weight: 300;">Cliquez pour parler</h2>
        <button class="btn-new-chat" style="margin-top: 30px; padding: 15px 50px;" onclick="toggleVoice()">
            🎙️ PARLER
        </button>
    </div>

    <div id="input-area">
        <div id="attachment-tray"></div>
        <div class="input-wrapper">
            <input type="file" id="file-input" hidden multiple onchange="handleFileUpload(this)">
            <button class="action-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <textarea id="main-input" placeholder="Envoyez un message ou analysez un fichier..." rows="1" oninput="autoResize(this)"></textarea>
            <button class="action-btn send-btn" onclick="handleSend()">▲</button>
        </div>
        <p style="text-align: center; font-size: 0.65rem; color: var(--text-muted); margin-top: 15px;">
            IXA v8.0 — IA Analytique Privée. Développé pour la performance.
        </p>
    </div>
</main>

<script>
    /** * IXA CORE ENGINE v8.0
     * Gestion de l'état global et de la persistance
     */
    const IXA = {
        key: localStorage.getItem('ixa_v8_key') || "",
        model: "llama-3.3-70b-versatile",
        history: JSON.parse(localStorage.getItem('ixa_v8_history')) || [],
        currentChatId: null,
        attachments: [],
        isListening: false,
        recognition: null
    };

    // --- INITIALISATION ---
    async function boot() {
        if (!IXA.key) {
            await tryLoadConfig();
        }
        updateApiStatus();
        renderHistory();
        
        if (IXA.history.length > 0) {
            loadChat(IXA.history[0].id);
        } else {
            createNewChat();
        }

        // Init Speech Recognition
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            IXA.recognition = new Speech();
            IXA.recognition.lang = 'fr-FR';
            IXA.recognition.continuous = false;
        }

        // Keyboard listener
        document.getElementById('main-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    }

    async function tryLoadConfig() {
        const paths = ['config.json', 'config (1).json'];
        for (let path of paths) {
            try {
                const res = await fetch(path);
                const data = await res.json();
                if (data.groq_api_key) {
                    IXA.key = data.groq_api_key.trim();
                    localStorage.setItem('ixa_v8_key', IXA.key);
                    break;
                }
            } catch (e) {}
        }
    }

    function updateApiStatus() {
        const label = document.getElementById('api-status-label');
        if (IXA.key) {
            label.innerHTML = `<span style="color:var(--success)">●</span> API CONNECTÉE`;
        } else {
            label.innerHTML = `<span style="color:var(--error)">●</span> ERREUR CONFIG.JSON`;
        }
    }

    // --- GESTION CHAT ---
    function createNewChat() {
        const newId = Date.now();
        const newChat = {
            id: newId,
            title: "Nouvelle discussion",
            messages: [],
            timestamp: new Date().toISOString()
        };
        IXA.history.unshift(newChat);
        IXA.currentChatId = newId;
        saveAll();
        loadChat(newId);
    }

    function loadChat(id) {
        IXA.currentChatId = id;
        const chat = IXA.history.find(c => c.id === id);
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        
        chat.messages.forEach(msg => {
            renderMessage(msg.role, msg.displayContent || msg.content);
        });
        
        renderHistory();
        container.scrollTop = container.scrollHeight;
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = IXA.history.map(chat => `
            <div class="chat-item ${chat.id === IXA.currentChatId ? 'active' : ''}" onclick="loadChat(${chat.id})">
                <span style="overflow:hidden; text-overflow:ellipsis">${chat.title}</span>
                <span class="delete-btn" onclick="deleteChat(event, ${chat.id})">✕</span>
            </div>
        `).join('');
    }

    function deleteChat(e, id) {
        e.stopPropagation();
        IXA.history = IXA.history.filter(c => c.id !== id);
        if (IXA.currentChatId === id) {
            if (IXA.history.length > 0) loadChat(IXA.history[0].id);
            else createNewChat();
        }
        saveAll();
        renderHistory();
    }

    // --- GESTION FICHIERS ---
    function handleFileUpload(input) {
        for (let file of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                IXA.attachments.push({
                    name: file.name,
                    content: e.target.result,
                    type: file.type
                });
                updateAttachmentTray();
            };
            reader.readAsText(file);
        }
    }

    function updateAttachmentTray() {
        const tray = document.getElementById('attachment-tray');
        tray.innerHTML = IXA.attachments.map((file, idx) => `
            <div class="attachment-tag">
                📄 ${file.name}
                <span style="cursor:pointer" onclick="removeAttachment(${idx})">✕</span>
            </div>
        `).join('');
    }

    function removeAttachment(idx) {
        IXA.attachments.splice(idx, 1);
        updateAttachmentTray();
    }

    // --- LOGIQUE ENVOI ---
    async function handleSend(voiceText = null) {
        const inputEl = document.getElementById('main-input');
        const text = voiceText || inputEl.value.trim();
        
        if (!text && IXA.attachments.length === 0) return;

        // Préparation du contenu visuel
        let visualContent = text;
        if (IXA.attachments.length > 0) {
            const filesHtml = IXA.attachments.map(f => `
                <div class="file-preview-card">
                    <span class="file-icon">📄</span>
                    <span class="file-name">${f.name}</span>
                </div>
            `).join('');
            visualContent = (text ? `<p>${text}</p>` : "") + filesHtml;
        }

        renderMessage('user', visualContent);
        inputEl.value = "";
        autoResize(inputEl);

        // Préparation du prompt pour l'IA
        let fullPrompt = text;
        if (IXA.attachments.length > 0) {
            fullPrompt = "CONTEXTE DOCUMENTS :\n";
            IXA.attachments.forEach(f => {
                fullPrompt += `--- FICHIER: ${f.name} ---\n${f.content}\n\n`;
            });
            fullPrompt += `REQUÊTE UTILISATEUR : ${text || "Analyse ces documents."}`;
        }

        // Sauvegarde message utilisateur
        const chat = IXA.history.find(c => c.id === IXA.currentChatId);
        if (chat.messages.length === 0) chat.title = text.substring(0, 30) || "Analyse de fichier";
        chat.messages.push({ role: 'user', content: fullPrompt, displayContent: visualContent });

        // Appel API
        try {
            const response = await callGroq(chat.messages);
            renderMessage('assistant', response);
            chat.messages.push({ role: 'assistant', content: response });
            saveAll();
        } catch (err) {
            renderMessage('assistant', `<span style="color:var(--error)">Erreur API : ${err.message}. Vérifiez votre config.json ou votre connexion.</span>`);
        }

        IXA.attachments = [];
        updateAttachmentTray();
    }

    async function callGroq(messages) {
        // Sécurité : rafraîchir la clé depuis le stockage local à chaque appel
        const activeKey = localStorage.getItem('ixa_v8_key');
        
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${activeKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: IXA.model,
                messages: [
                    { role: "system", content: "Tu es IXA, une IA de type Claude 3.5. Ton intelligence est analytique, technique et sobre. Ne répète jamais le contenu des fichiers envoyés, analyse-les directement." },
                    ...messages.map(m => ({ role: m.role, content: m.content }))
                ],
                temperature: 0.7
            })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || "Erreur inconnue");
        }

        const data = await response.json();
        return data.choices[0].message.content;
    }

    // --- UI UTILS ---
    function renderMessage(role, content) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        
        // Formatage simple des retours à la ligne et blocs de code
        let formatted = content.replace(/\n/g, '<br>');
        if (content.includes('```')) {
             formatted = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        }

        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA System'}</b><div>${formatted}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function switchMode(mode) {
        const chatView = document.getElementById('chat-container');
        const inputView = document.getElementById('input-area');
        const voiceView = document.getElementById('voice-view');
        
        if (mode === 'chat') {
            chatView.style.display = 'flex';
            inputView.style.display = 'block';
            voiceView.style.display = 'none';
        } else {
            chatView.style.display = 'none';
            inputView.style.display = 'none';
            voiceView.style.display = 'flex';
        }

        document.querySelectorAll('.nav-tabs span').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + mode).classList.add('active');
    }

    function saveAll() {
        localStorage.setItem('ixa_v8_history', JSON.stringify(IXA.history));
    }

    // --- VOCAL ---
    function toggleVoice() {
        if (!IXA.recognition) return alert("Vocal non supporté sur ce navigateur.");
        
        if (IXA.isListening) {
            IXA.recognition.stop();
        } else {
            document.getElementById('orb-box').classList.add('listening');
            document.getElementById('v-status').textContent = "Je vous écoute...";
            IXA.recognition.start();
            
            IXA.recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('v-status').textContent = "IXA réfléchit...";
                handleSend(text).then(reply => {
                    if (reply) speak(reply);
                });
            };

            IXA.recognition.onend = () => {
                document.getElementById('orb-box').classList.remove('listening');
                document.getElementById('v-status').textContent = "Cliquez pour parler";
                IXA.isListening = false;
            };

            IXA.isListening = true;
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        window.speechSynthesis.speak(utterance);
    }

    // Lancement
    boot();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA — Intelligence Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --sidebar: #0d0d18;
            --card: #13131f;
            --card2: #1a1a28;
            --accent: #7c6dfa;
            --accent2: #e879f9;
            --accent-glow: rgba(124, 109, 250, 0.25);
            --accent-soft: rgba(124, 109, 250, 0.12);
            --text: #eeeef5;
            --text-muted: #8888a8;
            --border: #1e1e30;
            --border2: #2a2a40;
            --user-bubble: #1a1a30;
            --error: #f87171;
            --success: #34d399;
            --warning: #fbbf24;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        #sidebar::before {
            content: '';
            position: absolute;
            top: -80px; left: -80px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(124,109,250,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            -webkit-text-fill-color: initial;
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .btn-new-chat {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            padding: 13px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.3px;
        }

        .btn-new-chat:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 6px;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            padding: 11px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
            position: relative;
        }

        .chat-item-icon { font-size: 0.75rem; flex-shrink: 0; }
        .chat-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .chat-item:hover { background: var(--card); color: var(--text); }
        .chat-item.active { background: var(--accent-soft); color: var(--accent); border-color: var(--border2); }

        .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 5px;
            transition: 0.2s;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .chat-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(248,113,113,0.1); }

        /* Model selector */
        .model-select-wrap {
            position: relative;
        }
        .model-select-wrap select {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            outline: none;
            appearance: none;
            transition: var(--transition);
        }
        .model-select-wrap select:hover { border-color: var(--accent); }
        .model-select-wrap::after {
            content: '⌄';
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 1rem;
        }

        #api-status-label {
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            padding: 8px 6px;
        }
        #api-status-label.ok { color: var(--success); }
        #api-status-label.err { color: var(--error); }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            background: var(--bg);
        }

        /* Subtle grid texture */
        main::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
            pointer-events: none;
        }

        header {
            height: 64px;
            padding: 0 36px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 8, 16, 0.7);
            backdrop-filter: blur(16px);
            position: relative;
            z-index: 5;
        }

        .nav-tabs { display: flex; gap: 6px; }
        .nav-tab {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.88rem;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 10px;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .nav-tab:hover { color: var(--text); background: var(--card); }
        .nav-tab.active { color: var(--accent); background: var(--accent-soft); border-color: var(--border2); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clear-btn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 7px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            transition: 0.2s;
        }
        .clear-btn:hover { border-color: var(--error); color: var(--error); }

        /* ── CHAT ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 36px max(5%, 24px);
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        /* Welcome screen */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            text-align: center;
            opacity: 0.6;
        }
        .welcome-logo {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-sub { color: var(--text-muted); font-size: 0.95rem; }
        .welcome-hints { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .hint-chip {
            background: var(--card);
            border: 1px solid var(--border2);
            padding: 9px 16px;
            border-radius: 100px;
            font-size: 0.83rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }
        .hint-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        /* Messages */
        .message {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            animation: msgIn 0.35s cubic-bezier(0.2, 0, 0, 1);
            max-width: 820px;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { flex-direction: row-reverse; align-self: flex-end; }

        .msg-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 2px solid var(--border2);
        }
        .message.user .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; }
        .message.assistant .msg-avatar { background: var(--card2); }

        .msg-body { flex: 1; min-width: 0; }
        .msg-role {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
            color: var(--text-muted);
        }
        .message.user .msg-role { text-align: right; color: var(--accent); }

        .msg-content {
            line-height: 1.75;
            font-size: 0.95rem;
            color: var(--text);
        }
        .message.user .msg-content {
            background: var(--user-bubble);
            padding: 14px 20px;
            border-radius: 18px 18px 4px 18px;
            border: 1px solid var(--border2);
            display: inline-block;
            text-align: left;
        }

        /* Markdown styles */
        .msg-content h1, .msg-content h2, .msg-content h3 { margin: 16px 0 8px; font-family: 'Syne', sans-serif; }
        .msg-content h1 { font-size: 1.4rem; }
        .msg-content h2 { font-size: 1.15rem; color: var(--accent); }
        .msg-content h3 { font-size: 1rem; color: var(--text-muted); }
        .msg-content p { margin-bottom: 10px; }
        .msg-content strong { color: #fff; font-weight: 600; }
        .msg-content em { color: var(--text-muted); font-style: italic; }
        .msg-content ul, .msg-content ol { padding-left: 22px; margin-bottom: 10px; }
        .msg-content li { margin-bottom: 4px; }
        .msg-content a { color: var(--accent); text-decoration: none; }
        .msg-content a:hover { text-decoration: underline; }

        .msg-content code:not(pre code) {
            background: var(--card2);
            border: 1px solid var(--border2);
            padding: 2px 7px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: var(--accent2);
        }

        .code-block {
            background: #0c0c18;
            border: 1px solid var(--border2);
            border-radius: 12px;
            overflow: hidden;
            margin: 14px 0;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border2);
            font-size: 0.75rem;
        }
        .code-lang { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
        .copy-btn {
            background: none;
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            transition: 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { color: var(--success); border-color: var(--success); }
        .code-block pre { background: none; border: none; border-radius: 0; margin: 0; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; overflow-x: auto; }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 8px 0;
        }
        .typing-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

        /* ── INPUT AREA ── */
        #input-area {
            padding: 16px max(5%, 24px) 28px;
            position: relative;
            z-index: 5;
        }

        #attachment-tray {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .attachment-chip {
            background: var(--card2);
            border: 1px solid var(--border2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .attachment-remove {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1;
            transition: 0.2s;
        }
        .attachment-remove:hover { color: var(--error); }

        .input-wrapper {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,109,250,0.05);
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            padding: 10px 6px;
            resize: none;
            outline: none;
            font-size: 0.97rem;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
            max-height: 200px;
        }
        textarea::placeholder { color: var(--text-muted); }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 9px;
            border-radius: 10px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
        }
        .action-btn:hover { color: var(--accent); background: var(--accent-soft); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            width: 38px; height: 38px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-glow); }
        .send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
        .send-btn svg { width: 16px; height: 16px; }

        .char-count { font-size: 0.7rem; color: var(--text-muted); align-self: flex-end; padding-bottom: 12px; opacity: 0; transition: 0.2s; }
        .char-count.visible { opacity: 1; }

        /* ── VOICE VIEW ── */
        #voice-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 0;
            position: relative;
        }

        .orb-container {
            position: relative;
            width: 220px; height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 110px; height: 110px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            transition: 0.5s;
            position: relative;
            z-index: 2;
        }
        .orb::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0.3;
            filter: blur(8px);
        }

        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            opacity: 0;
        }

        .listening .orb-ring { animation: orbRipple 2s infinite; }
        .listening .orb-ring:nth-child(2) { animation-delay: 0.4s; }
        .listening .orb-ring:nth-child(3) { animation-delay: 0.8s; }
        .listening .orb { transform: scale(1.15); }

        @keyframes orbRipple {
            0% { width: 110px; height: 110px; top: 55px; left: 55px; opacity: 0.7; border-color: var(--accent); }
            100% { width: 220px; height: 220px; top: 0; left: 0; opacity: 0; border-color: var(--accent2); }
        }

        #v-status { margin-top: 40px; font-weight: 300; color: var(--text-muted); font-size: 1.1rem; }
        #v-transcript { margin-top: 16px; font-size: 0.9rem; color: var(--text); max-width: 400px; min-height: 24px; }

        .voice-btn {
            margin-top: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .voice-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px var(--accent-glow); }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar { display: none; }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="brand"><div class="brand-dot"></div> IXA</div>
    <button class="btn-new-chat" onclick="createNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau chat
    </button>

    <span class="section-label">Historique</span>
    <div id="history-list"></div>

    <span class="section-label">Modèle</span>
    <div class="model-select-wrap">
        <select id="model-select" onchange="IXA.model = this.value">
            <option value="llama-3.1-8b-instant">Llama 3.1 8B · Rapide</option>
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B · Puissant</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B · Mixte</option>
            <option value="gemma2-9b-it">Gemma 2 9B · Compact</option>
        </select>
    </div>

    <div id="api-status-label">
        <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
        Vérification...
    </div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span id="tab-chat" class="nav-tab active" onclick="switchMode('chat')">💬 Assistant</span>
            <span id="tab-voice" class="nav-tab" onclick="switchMode('voice')">🎙️ Vocal</span>
        </div>
        <div class="header-right">
            <button class="clear-btn" onclick="clearCurrentChat()">Effacer</button>
        </div>
    </header>

    <div id="chat-container">
        <div id="welcome-screen">
            <div class="welcome-logo">IXA</div>
            <div class="welcome-sub">Votre intelligence personnelle, alimentée par Groq</div>
            <div class="welcome-hints">
                <div class="hint-chip" onclick="sendHint('Explique-moi le machine learning en 3 points')">🤖 Machine learning</div>
                <div class="hint-chip" onclick="sendHint('Écris-moi un script Python pour trier une liste')">🐍 Script Python</div>
                <div class="hint-chip" onclick="sendHint('Donne-moi 5 idées de projets créatifs')">✨ Idées créatives</div>
                <div class="hint-chip" onclick="sendHint('Résume les dernières tendances en IA')">📰 Tendances IA</div>
            </div>
        </div>
    </div>

    <div id="voice-view">
        <div class="orb-container" id="orb-box">
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb-ring"></div>
            <div class="orb"></div>
        </div>
        <div id="v-status">Prêt à vous écouter</div>
        <div id="v-transcript"></div>
        <button class="voice-btn" onclick="toggleVoice()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            Parler
        </button>
    </div>

    <div id="input-area">
        <div id="attachment-tray"></div>
        <div class="input-wrapper">
            <input type="file" id="file-input" hidden multiple onchange="handleFileUpload(this)">
            <button class="action-btn" title="Joindre un fichier" onclick="document.getElementById('file-input').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="main-input" placeholder="Écrivez votre message..." rows="1"
                oninput="handleInput(this)"
                onkeydown="handleKeyDown(event)"></textarea>
            <span class="char-count" id="char-count">0</span>
            <button class="send-btn" id="send-btn" onclick="handleSend()" title="Envoyer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</main>

<div id="toast"></div>

<script>
    const IXA = {
        key: localStorage.getItem('ixa_key') || "",
        model: "llama-3.1-8b-instant",
        chats: JSON.parse(localStorage.getItem('ixa_chats')) || [],
        currentChatId: null,
        attachments: [],
        recognition: null,
        synth: window.speechSynthesis,
        currentMode: 'chat',
        isLoading: false
    };

    // ── BOOT ──
    async function boot() {
        await tryLoadConfig();
        if (!IXA.key) {
            const k = prompt("Clé API Groq manquante.\nEntrez votre clé (gsk_...) :");
            if (k && k.trim()) {
                IXA.key = k.trim();
                localStorage.setItem('ixa_key', IXA.key);
            }
        }
        updateApiStatus();
        renderHistory();
        
        if (IXA.chats.length > 0) {
            loadChat(IXA.chats[0].id);
        } else {
            createNewChat();
        }

        initSpeech();
    }

    async function tryLoadConfig() {
        try {
            const res = await fetch('config.json');
            if (res.ok) {
                const data = await res.json();
                if (data.groq_api_key) {
                    IXA.key = data.groq_api_key.trim();
                    localStorage.setItem('ixa_key', IXA.key);
                }
            }
        } catch (e) { /* config.json optionnel */ }
    }

    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;
        IXA.recognition = new Speech();
        IXA.recognition.lang = 'fr-FR';
        IXA.recognition.continuous = false;
        IXA.recognition.interimResults = true;

        IXA.recognition.onresult = (e) => {
            const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
            document.getElementById('v-transcript').textContent = transcript;
            if (e.results[e.results.length - 1].isFinal) {
                handleVoiceResult(transcript);
            }
        };

        IXA.recognition.onerror = (e) => {
            console.error('Speech error:', e.error);
            resetVoiceUI();
        };

        IXA.recognition.onend = () => {
            document.getElementById('orb-box').classList.remove('listening');
        };
    }

    // ── SEND ──
    async function handleSend(voiceText = null) {
        if (IXA.isLoading) return;
        const input = document.getElementById('main-input');
        const text = (voiceText || input.value).trim();
        if (!text && IXA.attachments.length === 0) return;

        // Hide welcome screen
        const welcome = document.getElementById('welcome-screen');
        if (welcome) welcome.remove();

        IXA.isLoading = true;
        document.getElementById('send-btn').disabled = true;

        // Display user message
        renderMessage('user', text || "Fichier(s) joint(s)");
        if (!voiceText) { input.value = ""; input.style.height = 'auto'; }
        updateCharCount(0);

        // Build prompt
        const chat = IXA.chats.find(c => c.id === IXA.currentChatId);
        if (!chat) { IXA.isLoading = false; return; }

        let fullContent = text;
        if (IXA.attachments.length > 0) {
            const docs = IXA.attachments.map(a => `--- Fichier: ${a.name} ---\n${a.content}`).join('\n\n');
            fullContent = `${docs}\n\n--- Question ---\n${text}`;
        }

        // Auto-title after first message
        if (chat.messages.length === 0 && text) {
            chat.title = text.substring(0, 38) + (text.length > 38 ? '…' : '');
            renderHistory();
        }

        chat.messages.push({ role: 'user', content: fullContent, displayContent: text });
        saveAll();

        // Clear attachments
        IXA.attachments = [];
        document.getElementById('attachment-tray').innerHTML = "";

        // Show typing indicator
        const typingId = showTyping();

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${IXA.key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: IXA.model,
                    messages: [
                        { role: 'system', content: 'Tu es IXA, une intelligence artificielle personnelle avancée. Tu réponds en français, de manière claire, précise et agréable. Tu utilises le Markdown pour structurer tes réponses quand c\'est pertinent.' },
                        ...chat.messages.map(m => ({ role: m.role, content: m.content }))
                    ],
                    max_tokens: 2048,
                    temperature: 0.7
                })
            });

            removeTyping(typingId);

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                const msg = err.error?.message || `Erreur HTTP ${res.status}`;
                if (res.status === 401) {
                    showToast('❌ Clé API invalide');
                    updateApiStatus(false);
                }
                renderMessage('assistant', `⚠️ **Erreur :** ${msg}`);
                chat.messages.pop();
                saveAll();
            } else {
                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || "Réponse vide.";
                renderMessage('assistant', reply);
                chat.messages.push({ role: 'assistant', content: reply });
                saveAll();
                return reply;
            }
        } catch (e) {
            removeTyping(typingId);
            renderMessage('assistant', `⚠️ **Erreur réseau :** Impossible de joindre l'API. Vérifiez votre connexion.`);
            chat.messages.pop();
            saveAll();
        } finally {
            IXA.isLoading = false;
            document.getElementById('send-btn').disabled = false;
        }
        return null;
    }

    function sendHint(text) {
        document.getElementById('main-input').value = text;
        handleSend();
    }

    // ── TYPING INDICATOR ──
    let typingCounter = 0;
    function showTyping() {
        const id = `typing-${++typingCounter}`;
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = id;
        div.innerHTML = `
            <div class="msg-avatar">✦</div>
            <div class="msg-body">
                <div class="msg-role">IXA</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        document.getElementById(id)?.remove();
    }

    // ── RENDER MESSAGE ──
    function renderMessage(role, content) {
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const avatar = role === 'user' ? '🧑' : '✦';
        const roleName = role === 'user' ? 'Vous' : 'IXA';
        const formattedContent = role === 'assistant' ? markdownToHtml(content) : escapeHtml(content);
        div.innerHTML = `
            <div class="msg-avatar">${avatar}</div>
            <div class="msg-body">
                <div class="msg-role">${roleName}</div>
                <div class="msg-content">${formattedContent}</div>
            </div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
    }

    // ── MARKDOWN PARSER ──
    function markdownToHtml(text) {
        // Code blocks
        text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            const id = 'cb_' + Math.random().toString(36).slice(2);
            return `<div class="code-block">
                <div class="code-header">
                    <span class="code-lang">${lang || 'text'}</span>
                    <button class="copy-btn" id="${id}" onclick="copyCode('${id}')">Copier</button>
                </div>
                <pre><code>${escapeHtml(code.trim())}</code></pre>
            </div>`;
        });
        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Headers
        text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        // Bold / italic
        text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
        // Lists
        text = text.replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>');
        text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
        text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
        // Links
        text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        // Paragraphs
        text = text.replace(/\n\n+/g, '</p><p>');
        text = text.replace(/\n/g, '<br>');
        return `<p>${text}</p>`;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function copyCode(id) {
        const block = document.getElementById(id).closest('.code-block');
        const code = block.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => {
            const btn = document.getElementById(id);
            btn.textContent = '✓ Copié';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
        });
    }

    // ── INPUT HANDLING ──
    function handleInput(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 200) + 'px';
        updateCharCount(el.value.length);
    }

    function updateCharCount(n) {
        const el = document.getElementById('char-count');
        el.textContent = n > 0 ? n : '';
        el.classList.toggle('visible', n > 50);
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    }

    // ── VOICE ──
    function toggleVoice() {
        if (!IXA.recognition) { showToast('❌ Vocal non supporté sur ce navigateur'); return; }
        IXA.synth.cancel();
        document.getElementById('orb-box').classList.add('listening');
        document.getElementById('v-status').textContent = "Je vous écoute...";
        document.getElementById('v-transcript').textContent = "";
        try { IXA.recognition.start(); } catch(e) { resetVoiceUI(); }
    }

    async function handleVoiceResult(text) {
        document.getElementById('v-status').textContent = "IXA réfléchit...";
        document.getElementById('orb-box').classList.remove('listening');
        const reply = await handleSend(text);
        if (reply) {
            document.getElementById('v-status').textContent = "IXA répond...";
            speak(reply);
        } else {
            resetVoiceUI();
        }
    }

    function resetVoiceUI() {
        document.getElementById('orb-box').classList.remove('listening');
        document.getElementById('v-status').textContent = "Prêt à vous écouter";
        document.getElementById('v-transcript').textContent = "";
    }

    function speak(text) {
        if (IXA.currentMode !== 'voice') return;
        IXA.synth.cancel();
        const utter = new SpeechSynthesisUtterance(text.replace(/[*#_`>]/g, '').replace(/<[^>]+>/g, ''));
        utter.lang = 'fr-FR';
        utter.rate = 1.0;
        utter.onend = resetVoiceUI;
        IXA.synth.speak(utter);
    }

    // ── MODE SWITCH ──
    function switchMode(mode) {
        IXA.currentMode = mode;
        const isChat = mode === 'chat';
        document.getElementById('chat-container').style.display = isChat ? 'flex' : 'none';
        document.getElementById('input-area').style.display = isChat ? 'block' : 'none';
        document.getElementById('voice-view').style.display = isChat ? 'none' : 'flex';
        document.getElementById('tab-chat').classList.toggle('active', isChat);
        document.getElementById('tab-voice').classList.toggle('active', !isChat);
        if (isChat) { IXA.synth.cancel(); resetVoiceUI(); }
    }

    // ── CHAT MANAGEMENT ──
    function createNewChat() {
        const id = Date.now();
        IXA.chats.unshift({ id, title: "Nouveau chat", messages: [] });
        saveAll();
        loadChat(id);
    }

    function loadChat(id) {
        IXA.currentChatId = id;
        const chat = IXA.chats.find(c => c.id === id);
        if (!chat) return;
        const cont = document.getElementById('chat-container');
        cont.innerHTML = '';

        if (chat.messages.length === 0) {
            cont.innerHTML = `<div id="welcome-screen">
                <div class="welcome-logo">IXA</div>
                <div class="welcome-sub">Votre intelligence personnelle, alimentée par Groq</div>
                <div class="welcome-hints">
                    <div class="hint-chip" onclick="sendHint('Explique-moi le machine learning en 3 points')">🤖 Machine learning</div>
                    <div class="hint-chip" onclick="sendHint('Écris-moi un script Python pour trier une liste')">🐍 Script Python</div>
                    <div class="hint-chip" onclick="sendHint('Donne-moi 5 idées de projets créatifs')">✨ Idées créatives</div>
                    <div class="hint-chip" onclick="sendHint('Résume les dernières tendances en IA')">📰 Tendances IA</div>
                </div>
            </div>`;
        } else {
            chat.messages.forEach(m => renderMessage(m.role, m.displayContent || m.content));
        }
        renderHistory();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        IXA.chats = IXA.chats.filter(c => c.id !== id);
        saveAll();
        if (IXA.currentChatId === id) {
            if (IXA.chats.length > 0) loadChat(IXA.chats[0].id);
            else createNewChat();
        } else {
            renderHistory();
        }
        showToast('Chat supprimé');
    }

    function clearCurrentChat() {
        const chat = IXA.chats.find(c => c.id === IXA.currentChatId);
        if (!chat) return;
        chat.messages = [];
        chat.title = "Nouveau chat";
        saveAll();
        loadChat(IXA.currentChatId);
        showToast('Conversation effacée');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if (IXA.chats.length === 0) {
            list.innerHTML = '<div style="color:var(--text-muted); font-size:0.8rem; padding:8px 6px;">Aucun chat</div>';
            return;
        }
        list.innerHTML = IXA.chats.map(c => `
            <div class="chat-item ${c.id === IXA.currentChatId ? 'active' : ''}" onclick="loadChat(${c.id})">
                <span style="font-size:0.8rem">💬</span>
                <span class="chat-item-text">${escapeHtml(c.title || 'Nouveau chat')}</span>
                <button class="delete-btn" onclick="deleteChat(${c.id}, event)" title="Supprimer">✕</button>
            </div>
        `).join('');
    }

    // ── FILE UPLOAD ──
    function handleFileUpload(input) {
        for (let f of input.files) {
            if (f.size > 2 * 1024 * 1024) { showToast(`❌ Fichier trop grand (max 2MB) : ${f.name}`); continue; }
            const r = new FileReader();
            r.onload = (e) => {
                IXA.attachments.push({ name: f.name, content: e.target.result });
                renderAttachments();
            };
            r.onerror = () => showToast(`❌ Erreur lecture : ${f.name}`);
            r.readAsText(f);
        }
        input.value = "";
    }

    function renderAttachments() {
        const tray = document.getElementById('attachment-tray');
        tray.innerHTML = IXA.attachments.map((a, i) => `
            <div class="attachment-chip">
                📄 ${escapeHtml(a.name)}
                <span class="attachment-remove" onclick="removeAttachment(${i})">×</span>
            </div>
        `).join('');
    }

    function removeAttachment(index) {
        IXA.attachments.splice(index, 1);
        renderAttachments();
    }

    // ── UTILS ──
    function updateApiStatus(ok = null) {
        const el = document.getElementById('api-status-label');
        const hasKey = ok !== false && !!IXA.key;
        el.className = hasKey ? 'ok' : 'err';
        el.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg> ${hasKey ? 'API Connectée' : 'Clé API manquante'}`;
    }

    function saveAll() {
        // Limit history to 50 chats
        if (IXA.chats.length > 50) IXA.chats = IXA.chats.slice(0, 50);
        try {
            localStorage.setItem('ixa_chats', JSON.stringify(IXA.chats));
        } catch(e) {
            // localStorage full — trim messages
            IXA.chats.forEach(c => { if (c.messages.length > 20) c.messages = c.messages.slice(-20); });
            localStorage.setItem('ixa_chats', JSON.stringify(IXA.chats));
        }
    }

    let toastTimeout;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    boot();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>IXA v3</title>
    <style>
        body { font-family: Arial, sans-serif; margin:20px; }
        #chat { border:1px solid #ccc; padding:10px; height:400px; overflow-y:auto; background:#f9f9f9; }
        .user { text-align:right; color:#006; margin:5px 0; }
        .assistant { text-align:left; color:#080; margin:5px 0; }
        #input { width:80%; padding:8px; }
        #send { padding:8px 12px; }
    </style>
</head>
<body>
    <h1>IXA v3</h1>
    <div id="chat"></div>
    <div style="margin-top:10px;">
        <input id="input" placeholder="Votre message..." autocomplete="off" />
        <button id="send">Envoyer</button>
    </div>

    <script>
        let config = {
            groq_api_key: "",
            groq_model: "llama-3.3-70b-versatile"
        };

        async function loadConfig() {
            try {
                const resp = await fetch('config.json');
                if (resp.ok) config = await resp.json();
            } catch (e) {
                console.warn('Impossible de charger config.json', e);
            }
        }

        function append(role, text) {
            const div = document.createElement('div');
            div.className = role;
            div.textContent = text;
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            append('user', message);
            input.value = '';

            try {
                const body = {
                    model: config.groq_model || 'llama-3.3-70b-versatile',
                    messages: [
                        { role: 'system', content: 'Tu es IXA, une intelligence artificielle personnelle. Réponds toujours en français, de façon directe, utile et précise.' },
                        { role: 'user', content: message }
                    ],
                    max_tokens: 4000,
                    temperature: 0.8
                };
                const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + config.groq_api_key
                    },
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error);
                const reply = data.choices[0].message.content;
                append('assistant', reply);
            } catch (err) {
                append('assistant', 'Erreur : ' + err.message);
            }
        }

        document.getElementById('send').addEventListener('click', sendMessage);
        document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

        loadConfig();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v3 — Intelligence Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg:#0c0c0f; --c1:#111115; --c2:#18181e; --c3:#1f1f27;
            --ln:#23232c; --g:#a8ff3e; --b:#3eb8ff; --r:#ff4d6d; --p:#9d6bff;
            --tx:#eeeef4; --t2:#6e6e82;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--tx); font-family:'Geist', sans-serif; display:flex; height:100vh; overflow:hidden; }
        
        /* Sidebar Navigation */
        nav { width: 70px; background: var(--c1); border-right: 1px solid var(--ln); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        nav button { background: none; border: none; color: var(--t2); cursor: pointer; font-size: 20px; transition: 0.3s; }
        nav button.active { color: var(--g); }

        /* Main Content */
        #container { flex:1; display:flex; position: relative; }
        #view-chat, #view-voice { flex:2; display:none; flex-direction:column; padding:20px; }
        #view-chat.active, #view-voice.active { display:flex; }

        /* Chat Area */
        #chat { flex:1; overflow-y:auto; margin-bottom: 20px; display:flex; flex-direction:column; gap:10px; padding-right: 10px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--b); color: #000; }
        .assistant { align-self: flex-start; background: var(--c3); border: 1px solid var(--ln); }
        .img-gen { width: 100%; border-radius: 10px; margin-top: 10px; }

        /* Inputs */
        .input-group { display: flex; gap: 10px; background: var(--c2); padding: 10px; border-radius: 15px; border: 1px solid var(--ln); }
        input[type="text"] { flex:1; background:none; border:none; color:white; outline:none; }
        button.icon { background:none; border:none; color:var(--t2); cursor:pointer; font-size:18px; }
        button.icon:hover { color:var(--g); }

        /* Voice View */
        #view-voice { align-items: center; justify-content: center; text-align: center; }
        .orb { width: 150px; height: 150px; background: var(--g); border-radius: 50%; filter: blur(20px); opacity: 0.5; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity:0.5; } 50% { transform: scale(1.2); opacity:0.8; } 100% { transform: scale(1); opacity:0.5; } }

        /* Settings Sidebar */
        aside { width: 300px; background: var(--c1); border-left: 1px solid var(--ln); padding: 20px; overflow-y: auto; }
        h2 { color: var(--g); font-size: 16px; margin-bottom: 15px; }
        label { display:block; font-size:12px; color:var(--t2); margin-bottom:5px; }
        input, select { width:100%; background:var(--c3); border:1px solid var(--ln); color:white; padding:8px; border-radius:5px; margin-bottom:15px; }
        .btn-save { width:100%; padding:10px; background:var(--g); border:none; border-radius:5px; cursor:pointer; font-weight:600; }
    </style>
</head>
<body>

<nav>
    <button onclick="switchView('chat')" id="nav-chat" class="active">💬</button>
    <button onclick="switchView('voice')" id="nav-voice">🎙️</button>
</nav>

<div id="container">
    <div id="view-chat" class="active">
        <div id="chat"></div>
        <div class="input-group">
            <input type="file" id="file-input" hidden onchange="handleFileUpload(this)">
            <button class="icon" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="user-input" placeholder="Demandez n'importe quoi ou générez une image..." onkeydown="if(e.key==='Enter') sendMessage()">
            <button class="icon" onclick="sendMessage()">⚡</button>
        </div>
    </div>

    <div id="view-voice">
        <div class="orb" id="voice-orb"></div>
        <h2 id="voice-status" style="margin-top:30px">Prêt à écouter...</h2>
        <button class="btn-save" style="width:auto; padding:15px 40px; margin-top:20px" onclick="toggleVoice()">Démarrer la conversation</button>
    </div>

    <aside>
        <h2>⚙ CONFIGURATION</h2>
        <label>Clé API Groq</label>
        <input type="password" id="cfg_api">
        <label>Modèle</label>
        <select id="cfg_model">
            <option>llama-3.3-70b-versatile</option>
            <option>llama-3.1-8b-instant</option>
        </select>
        <label>Dépôt GitHub</label>
        <input type="text" id="cfg_repo">
        <label>Token GitHub</label>
        <input type="password" id="cfg_ghtoken">
        <button class="btn-save" onclick="saveSettings()">Sauvegarder</button>
    </aside>
</div>

<script>
    let config = {};
    let isListening = false;
    const synth = window.speechSynthesis;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'fr-FR'; rec.continuous = false; }

    async function init() {
        try {
            const r = await fetch('config.json');
            config = await r.json();
            document.getElementById('cfg_api').value = config.groq_api_key;
            document.getElementById('cfg_model').value = config.groq_model;
            document.getElementById('cfg_repo').value = config.github_repo;
            document.getElementById('cfg_ghtoken').value = config.github_token;
        } catch(e) { console.log("Config non trouvée"); }
    }

    function switchView(view) {
        document.querySelectorAll('#view-chat, #view-voice').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('view-'+view).classList.add('active');
        document.getElementById('nav-'+view).classList.add('active');
    }

    function appendMsg(role, content, isImage = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if(isImage) {
            div.innerHTML = `<img src="${content}" class="img-gen">`;
        } else {
            div.textContent = content;
        }
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    // Gestion de l'IA et de l'Image
    async function sendMessage(overrideText = null) {
        const input = document.getElementById('user-input');
        const text = overrideText || input.value.trim();
        if(!text) return;
        
        appendMsg('user', text);
        if(!overrideText) input.value = '';

        // Détection demande d'image
        if(text.toLowerCase().startsWith("dessine") || text.toLowerCase().startsWith("génère une image")) {
            const prompt = encodeURIComponent(text.replace("dessine", "").replace("génère une image", ""));
            const imgUrl = `https://pollinations.ai/p/${prompt}?width=1024&height=1024&nologo=true`;
            appendMsg('assistant', imgUrl, true);
            return;
        }

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${config.groq_api_key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: config.groq_model,
                    messages: [{role: "system", content: "Tu es IXA. Réponds brièvement."}, {role: "user", content: text}]
                })
            });
            const data = await response.json();
            const reply = data.choices[0].message.content;
            appendMsg('assistant', reply);
            return reply;
        } catch(e) {
            appendMsg('assistant', "Erreur API Groq. Vérifiez votre clé.");
        }
    }

    // Analyse de documents
    async function handleFileUpload(input) {
        const file = input.files[0];
        if(!file) return;
        appendMsg('assistant', `Analyse de ${file.name} en cours...`);
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            // On envoie le contenu du fichier comme contexte
            const prompt = `Voici le contenu d'un document nommé ${file.name} : \n\n ${content.substring(0, 5000)} \n\n Analyse ce document et fais moi un résumé.`;
            sendMessage(prompt);
        };
        reader.readAsText(file);
    }

    // Mode Vocal (STT & TTS)
    function toggleVoice() {
        if(!rec) return alert("Microphone non supporté");
        isListening = true;
        document.getElementById('voice-status').textContent = "Je vous écoute...";
        rec.start();
    }

    if(rec) {
        rec.onresult = async (e) => {
            const transcript = e.results[0][0].transcript;
            document.getElementById('voice-status').textContent = "Réflexion...";
            const reply = await sendMessage(transcript);
            speak(reply);
        };
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.onstart = () => document.getElementById('voice-status').textContent = "IXA parle...";
        utterance.onend = () => {
            document.getElementById('voice-status').textContent = "Prêt à écouter...";
            // Optionnel : relancer l'écoute automatique ici
        };
        synth.speak(utterance);
    }

    async function saveSettings() {
        config.groq_api_key = document.getElementById('cfg_api').value;
        config.groq_model = document.getElementById('cfg_model').value;
        // La logique GitHub du fichier précédent peut être recopiée ici pour la persistance
        alert("Config mise à jour localement !");
    }

    init();
</script>
</body>
</html>

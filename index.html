<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA — Intelligence Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --sidebar: #111116;
            --card: #18181f;
            --accent: #a8ff3e;
            --accent-soft: rgba(168, 255, 62, 0.1);
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --user-bubble: #27272e;
            --error: #ef4444;
            --success: #22c55e;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-new-chat {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            margin-bottom: 25px;
        }

        .btn-new-chat:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-soft);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .chat-item:hover { background: var(--card); color: var(--text); }
        .chat-item.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

        .delete-btn { opacity: 0; color: var(--error); transition: 0.2s; }
        .chat-item:hover .delete-btn { opacity: 1; }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, #1a1a25, #0b0b0f);
        }

        header {
            height: 70px;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 11, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-tabs { display: flex; gap: 30px; }
        .nav-tabs span {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-muted);
            position: relative;
            padding: 10px 0;
            transition: 0.3s;
        }

        .nav-tabs span.active { color: var(--accent); }
        .nav-tabs span.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message { max-width: 85%; line-height: 1.7; animation: slideIn 0.4s ease-out; }
        .message.user { align-self: flex-end; background: var(--user-bubble); padding: 15px 22px; border-radius: 20px 20px 4px 20px; border: 1px solid var(--border); }
        .message.assistant { align-self: flex-start; width: 100%; }
        .message b { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); }

        pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; margin: 15px 0; border: 1px solid var(--border); font-family: 'Fira Code', monospace; font-size: 0.9rem; }

        /* --- INPUT AREA --- */
        #input-area { padding: 20px 15% 40px 15%; }
        .input-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        textarea { flex: 1; background: none; border: none; color: var(--text); padding: 12px 5px; resize: none; outline: none; font-size: 1.05rem; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.2s; }
        .action-btn:hover { color: var(--accent); }

        /* --- VOICE MODE --- */
        #voice-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .orb-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .orb { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; filter: blur(2px); transition: 0.5s; }
        .orb-wave { position: absolute; width: 100px; height: 100px; border: 2px solid var(--accent); border-radius: 50%; opacity: 0; }
        .listening .orb-wave { animation: ripple 2s infinite; }
        .listening .orb { transform: scale(1.2); box-shadow: 0 0 30px var(--accent); }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="brand"><div style="width:8px; height:8px; border-radius:50%; background:var(--success)"></div> IXA SYSTEM</div>
    <button class="btn-new-chat" onclick="createNewChat()">+ Nouveau Chat</button>
    <div id="history-list"></div>
    <div id="api-status-label" style="margin-top: auto; font-size: 0.75rem;">Vérification...</div>
</aside>

<main>
    <header>
        <div class="nav-tabs">
            <span id="tab-chat" class="active" onclick="switchMode('chat')">Assistant</span>
            <span id="tab-voice" onclick="switchMode('voice')">Mode Vocal</span>
        </div>
        <div style="background: var(--card); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--border);">Llama 3.1 8B</div>
    </header>

    <div id="chat-container"></div>

    <div id="voice-view">
        <div class="orb-container" id="orb-box"><div class="orb"></div><div class="orb-wave"></div></div>
        <h2 id="v-status" style="margin-top: 40px; font-weight: 300;">Prêt à vous écouter</h2>
        <button class="btn-new-chat" style="margin-top: 30px;" onclick="toggleVoice()">🎙️ PARLER</button>
    </div>

    <div id="input-area">
        <div id="attachment-tray"></div>
        <div class="input-wrapper">
            <input type="file" id="file-input" hidden multiple onchange="handleFileUpload(this)">
            <button class="action-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <textarea id="main-input" placeholder="Écrivez ici..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="action-btn" onclick="handleSend()" style="color:var(--accent)">▲</button>
        </div>
    </div>
</main>

<script>
    const IXA = {
        key: localStorage.getItem('ixa_key') || "",
        model: "llama-3.1-8b-instant",
        history: JSON.parse(localStorage.getItem('ixa_history')) || [],
        currentChatId: null,
        attachments: [],
        recognition: null,
        synth: window.speechSynthesis,
        currentMode: 'chat'
    };

    async function tryLoadConfig() {
        try {
            const res = await fetch('config.json');
            if (res.ok) {
                const data = await res.json();
                if (data.groq_api_key) {
                    IXA.key = data.groq_api_key.trim();
                    localStorage.setItem('ixa_key', IXA.key);
                }
            }
        } catch (e) { console.log("Fichier config.json non accessible."); }
    }

    async function boot() {
        await tryLoadConfig();
        if (!IXA.key) {
            const k = prompt("Clé API Groq manquante. Entrez votre clé (gsk_...) :");
            if (k) { IXA.key = k.trim(); localStorage.setItem('ixa_key', IXA.key); }
        }
        updateApiStatus();
        renderHistory();
        IXA.history.length > 0 ? loadChat(IXA.history[0].id) : createNewChat();

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            IXA.recognition = new Speech();
            IXA.recognition.lang = 'fr-FR';
            IXA.recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('v-status').textContent = "IXA réfléchit...";
                const reply = await handleSend(text);
                if (reply) speak(reply);
            };
            IXA.recognition.onend = () => {
                document.getElementById('orb-box').classList.remove('listening');
                document.getElementById('v-status').textContent = "Prêt à vous écouter";
            };
        }
    }

    async function handleSend(voiceText = null) {
        const input = document.getElementById('main-input');
        const text = voiceText || input.value.trim();
        if (!text && IXA.attachments.length === 0) return;

        renderMessage('user', text || "Analyse de fichiers");
        input.value = "";
        
        const chat = IXA.history.find(c => c.id === IXA.currentChatId);
        let fullPrompt = text;
        if (IXA.attachments.length > 0) {
            fullPrompt = "DOCUMENTS:\n" + IXA.attachments.map(a => `[${a.name}]\n${a.content}`).join('\n') + "\nQUESTION: " + text;
        }
        chat.messages.push({ role: 'user', content: fullPrompt, displayContent: text });

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${IXA.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: IXA.model, messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            renderMessage('assistant', reply);
            chat.messages.push({ role: 'assistant', content: reply });
            saveAll();
            IXA.attachments = [];
            document.getElementById('attachment-tray').innerHTML = "";
            return reply;
        } catch (e) {
            renderMessage('assistant', "Erreur API : Vérifiez votre clé.");
            return null;
        }
    }

    function renderMessage(role, content) {
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const formatted = content.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        div.innerHTML = `<b>${role === 'user' ? 'Vous' : 'IXA'}</b><div>${formatted}</div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
    }

    function switchMode(mode) {
        IXA.currentMode = mode;
        document.getElementById('chat-container').style.display = mode === 'chat' ? 'flex' : 'none';
        document.getElementById('input-area').style.display = mode === 'chat' ? 'block' : 'none';
        document.getElementById('voice-view').style.display = mode === 'chat' ? 'none' : 'flex';
        document.getElementById('tab-chat').classList.toggle('active', mode === 'chat');
        document.getElementById('tab-voice').classList.toggle('active', mode === 'voice');
        IXA.synth.cancel();
    }

    function toggleVoice() {
        if (!IXA.recognition) return alert("Vocal non supporté.");
        IXA.synth.cancel();
        document.getElementById('orb-box').classList.add('listening');
        document.getElementById('v-status').textContent = "Je vous écoute...";
        IXA.recognition.start();
    }

    function speak(text) {
        if (IXA.currentMode !== 'voice') return;
        const utter = new SpeechSynthesisUtterance(text.replace(/[*#_]/g, ""));
        utter.lang = 'fr-FR';
        IXA.synth.speak(utter);
    }

    function createNewChat() {
        const id = Date.now();
        IXA.history.unshift({ id, title: "Nouvelle discussion", messages: [] });
        saveAll(); loadChat(id);
    }

    function loadChat(id) {
        IXA.currentChatId = id;
        const chat = IXA.history.find(c => c.id === id);
        document.getElementById('chat-container').innerHTML = "";
        chat.messages.forEach(m => renderMessage(m.role, m.displayContent || m.content));
        renderHistory();
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = IXA.history.map(c => `
            <div class="chat-item ${c.id === IXA.currentChatId ? 'active' : ''}" onclick="loadChat(${c.id})">
                ${c.messages[0]?.displayContent.substring(0, 20) || "Nouveau Chat"}
            </div>
        `).join('');
    }

    function handleFileUpload(input) {
        for (let f of input.files) {
            const r = new FileReader();
            r.onload = (e) => {
                IXA.attachments.push({ name: f.name, content: e.target.result });
                document.getElementById('attachment-tray').innerHTML += `<div style="color:var(--accent); font-size:0.8rem;">📄 ${f.name}</div>`;
            };
            r.readAsText(f);
        }
    }

    function updateApiStatus() {
        document.getElementById('api-status-label').innerHTML = IXA.key ? "● API CONNECTÉE" : "● ERREUR CONFIG";
    }

    function saveAll() { localStorage.setItem('ixa_history', JSON.stringify(IXA.history)); }

    boot();
</script>
</body>
</html>

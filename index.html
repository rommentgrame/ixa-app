<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXA v9 — Infinity Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a; --sidebar: #0f0f13; --card: #14141a;
            --accent: #a8ff3e; --accent-hover: #c1ff76; --accent-soft: rgba(168, 255, 62, 0.1);
            --text: #f4f4f5; --text-muted: #71717a; --border: #27272a;
            --user-msg: #1d1d26; --error: #f87171; --success: #4ade80;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* --- SIDEBAR DYNAMIQUE --- */
        #sidebar {
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; z-index: 100;
        }

        .logo {
            font-size: 1.4rem; font-weight: 800; color: var(--accent);
            letter-spacing: -1px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px;
        }

        .btn-action {
            background: var(--accent); color: #000; border: none; padding: 12px;
            border-radius: 10px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--transition); margin-bottom: 20px;
        }
        .btn-action:hover { background: var(--accent-hover); transform: translateY(-1px); }

        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; color: var(--text-muted);
            cursor: pointer; transition: var(--transition); display: flex; justify-content: space-between;
            align-items: center; border: 1px solid transparent;
        }
        .history-item:hover { background: var(--card); color: var(--text); }
        .history-item.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(168, 255, 62, 0.3); }
        .delete-icon { opacity: 0; color: var(--error); transition: 0.2s; font-size: 1rem; }
        .history-item:hover .delete-icon { opacity: 1; }

        /* --- PANNEAU PRINCIPAL --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; background: #08080a; }
        
        header {
            height: 65px; padding: 0 30px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(8, 8, 10, 0.8); backdrop-filter: blur(12px);
        }

        .tabs { display: flex; gap: 25px; }
        .tabs span {
            cursor: pointer; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);
            padding: 20px 0; transition: 0.3s; position: relative;
        }
        .tabs span.active { color: var(--accent); }
        .tabs span.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--accent);
        }

        /* ZONE DE CHAT */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 40px 18%; display: flex; flex-direction: column; gap: 32px;
            scroll-behavior: smooth;
        }

        .msg-row { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .msg-row.user { align-items: flex-end; }
        .msg-row.assistant { align-items: flex-start; }

        .bubble {
            max-width: 85%; line-height: 1.6; font-size: 1rem; position: relative;
            word-wrap: break-word;
        }
        .user .bubble {
            background: var(--user-msg); padding: 14px 20px; border-radius: 18px 18px 4px 18px;
            border: 1px solid var(--border);
        }
        .assistant .bubble { width: 100%; }

        .bubble b {
            display: block; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1.2px; margin-bottom: 8px; color: var(--accent);
        }

        /* FICHIERS CLAUDE-STYLE */
        .file-pill {
            display: inline-flex; align-items: center; gap: 10px; background: var(--sidebar);
            border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px;
            margin-top: 10px; transition: 0.2s;
        }
        .file-pill:hover { border-color: var(--accent); background: var(--card); }

        /* --- INPUT SYSTEM --- */
        #input-dock { padding: 20px 18% 40px 18%; background: linear-gradient(transparent, var(--bg)); }
        .input-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .input-card:focus-within { border-color: var(--accent); }

        textarea {
            flex: 1; background: none; border: none; color: var(--text); padding: 8px 0;
            resize: none; max-height: 180px; outline: none; font-size: 1rem;
        }

        .icon-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 8px; border-radius: 8px; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--accent); background: var(--accent-soft); }

        #attachment-area { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag {
            background: var(--accent-soft); color: var(--accent); padding: 5px 12px;
            border-radius: 15px; font-size: 0.75rem; border: 1px solid rgba(168, 255, 62, 0.2);
        }

        /* --- MODE VOCAL --- */
        #voice-ui {
            display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%;
        }
        .orb {
            width: 120px; height: 120px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 40px var(--accent-soft); position: relative;
        }
        .orb.active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }

        /* --- CODE HIGHLIGHT --- */
        pre {
            background: #000; padding: 16px; border-radius: 12px; overflow-x: auto;
            margin: 15px 0; border: 1px solid var(--border); font-family: 'Fira Code', monospace; font-size: 0.9rem;
        }
        code { font-family: 'Fira Code', monospace; }

        .model-status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; background: var(--border); }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo">IXA INFINITY</div>
    <button class="btn-action" onclick="createNewChat()">+ Nouveau Projet</button>
    <div id="history-list"></div>
    <div id="api-info" style="margin-top: auto; font-size: 0.7rem; color: var(--text-muted);">Initialisation...</div>
</aside>

<main>
    <header>
        <div class="tabs">
            <span id="tab-chat" class="active" onclick="toggleView('chat')">Analyseur</span>
            <span id="tab-voice" onclick="toggleView('voice')">Interface Vocale</span>
        </div>
        <div id="current-model" class="model-status">Llama 3.3 70B</div>
    </header>

    <div id="chat-flow"></div>

    <div id="voice-ui">
        <div class="orb" id="v-orb"></div>
        <h2 id="v-msg" style="margin-top: 40px; font-weight: 300;">Prêt pour la commande vocale</h2>
        <button class="btn-action" style="margin-top: 30px; padding: 15px 40px" onclick="startSpeech()">COMMENCER</button>
    </div>

    <div id="input-dock">
        <div id="attachment-area"></div>
        <div class="input-card">
            <input type="file" id="file-up" hidden multiple onchange="handleFiles(this)">
            <button class="icon-btn" onclick="document.getElementById('file-up').click()">📎</button>
            <textarea id="user-q" placeholder="Posez une question ou déposez un fichier..." rows="1" oninput="autoHeight(this)"></textarea>
            <button class="icon-btn" style="color: var(--accent)" onclick="handleExecution()">▲</button>
        </div>
    </div>
</main>

<script>
    /**
     * CORE IXA ENGINE v9.0
     * Logic for History, Model Switching, and Stability
     */
    const STATE = {
        apiKey: localStorage.getItem('ixa_key_v9') || "",
        history: JSON.parse(localStorage.getItem('ixa_hist_v9')) || [],
        activeChatId: null,
        pendingFiles: [],
        currentModel: "llama-3.3-70b-versatile",
        models: ["llama-3.3-70b-versatile", "llama-3.1-8b-instant", "mixtral-8x7b-32768"],
        isSpeaking: false
    };

    async function init() {
        if (!STATE.apiKey) {
            try {
                const r = await fetch('config.json');
                const d = await r.json();
                STATE.apiKey = d.groq_api_key;
                localStorage.setItem('ixa_key_v9', STATE.apiKey);
            } catch(e) {}
        }
        document.getElementById('api-info').textContent = STATE.apiKey ? "SYSTEM READY" : "API KEY MISSING";
        if (STATE.history.length > 0) loadChat(STATE.history[0].id); else createNewChat();
    }

    // --- GESTION DES MODÈLES (LE SWITCH) ---
    async function callApi(messages) {
        async function attempt(modelIdx) {
            if (modelIdx >= STATE.models.length) throw new Error("Saturation totale de l'API Groq.");
            
            const model = STATE.models[modelIdx];
            updateModelBadge(model);

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${STATE.apiKey}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: "system", content: "Tu es IXA, une IA analytique supérieure. Réponds avec élégance, précision et brièveté si nécessaire. Analyse les fichiers fournis sans les répéter." },
                        ...messages.map(m => ({ role: m.role, content: m.raw || m.content }))
                    ],
                    temperature: 0.6
                })
            });

            const data = await response.json();

            // SWITCH SI LIMITE ATTEINTE (429)
            if (response.status === 429) {
                console.warn(`Switching from ${model} due to rate limit...`);
                return attempt(modelIdx + 1);
            }

            if (!response.ok) throw new Error(data.error?.message || "Erreur API");
            return data.choices[0].message.content;
        }
        return attempt(0);
    }

    // --- EXECUTION PRINCIPALE ---
    async function handleExecution(voiceText = null) {
        const input = document.getElementById('user-q');
        const text = voiceText || input.value.trim();
        if (!text && STATE.pendingFiles.length === 0) return;

        // UI : Message Utilisateur
        let visual = text;
        if (STATE.pendingFiles.length > 0) {
            visual = (text ? `<p>${text}</p>` : "") + STATE.pendingFiles.map(f => `<div class="file-pill">📄 ${f.name}</div>`).join('');
        }
        renderMsg('user', visual);
        input.value = ""; autoHeight(input);

        // Préparation du Context Caché
        let rawContent = text;
        if (STATE.pendingFiles.length > 0) {
            rawContent = "DOCUMENTS :\n" + STATE.pendingFiles.map(f => `[${f.name}]\n${f.content}`).join("\n") + "\n\nREQUÊTE : " + text;
        }

        const chat = STATE.history.find(c => c.id === STATE.activeChatId);
        if (chat.messages.length === 0) {
            chat.title = text.substring(0, 30) || "Analyse Document";
            renderHistory();
        }
        chat.messages.push({ role: 'user', content: visual, raw: rawContent });

        try {
            const reply = await callApi(chat.messages);
            renderMsg('assistant', reply);
            chat.messages.push({ role: 'assistant', content: reply });
            save();
        } catch (e) {
            renderMsg('assistant', `<span style="color:var(--error)">${e.message}</span>`);
        }

        STATE.pendingFiles = [];
        document.getElementById('attachment-area').innerHTML = "";
    }

    // --- INTERFACE & HISTORIQUE ---
    function createNewChat() {
        const id = Date.now();
        STATE.history.unshift({ id, title: "Nouveau projet", messages: [] });
        STATE.activeChatId = id;
        save(); loadChat(id);
    }

    function loadChat(id) {
        STATE.activeChatId = id;
        const chat = STATE.history.find(c => c.id === id);
        const flow = document.getElementById('chat-flow');
        flow.innerHTML = "";
        chat.messages.forEach(m => renderMsg(m.role, m.content));
        renderHistory();
        flow.scrollTop = flow.scrollHeight;
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = STATE.history.map(c => `
            <div class="history-item ${c.id === STATE.activeChatId ? 'active' : ''}" onclick="loadChat(${c.id})">
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${c.title}</span>
                <span class="delete-icon" onclick="deleteChat(event, ${c.id})">✕</span>
            </div>
        `).join('');
    }

    function deleteChat(e, id) {
        e.stopPropagation();
        STATE.history = STATE.history.filter(c => c.id !== id);
        if (STATE.activeChatId === id) {
            if (STATE.history.length > 0) loadChat(STATE.history[0].id); else createNewChat();
        }
        save(); renderHistory();
    }

    function renderMsg(role, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `msg-row ${role}`;
        
        let html = content;
        if (content.includes('```')) {
            html = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        }
        html = html.replace(/\n/g, '<br>');

        div.innerHTML = `<div class="bubble"><b>${role === 'user' ? 'Utilisateur' : 'IXA Infinity'}</b><div>${html}</div></div>`;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    function handleFiles(input) {
        for (let f of input.files) {
            const r = new FileReader();
            r.onload = (e) => {
                STATE.pendingFiles.push({ name: f.name, content: e.target.result });
                document.getElementById('attachment-area').innerHTML += `<div class="tag">📄 ${f.name}</div>`;
            };
            r.readAsText(f);
        }
    }

    // --- VOCAL ---
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognizer = Speech ? new Speech() : null;
    if(recognizer) recognizer.lang = 'fr-FR';

    function startSpeech() {
        if(!recognizer) return alert("Vocal non supporté.");
        document.getElementById('v-orb').classList.add('active');
        document.getElementById('v-msg').textContent = "Écoute active...";
        recognizer.start();
        recognizer.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            const rep = await handleExecution(txt);
            if(rep) {
                const u = new SpeechSynthesisUtterance(rep);
                u.lang = 'fr-FR';
                window.speechSynthesis.speak(u);
            }
        };
        recognizer.onend = () => {
            document.getElementById('v-orb').classList.remove('active');
            document.getElementById('v-msg').textContent = "Prêt pour la commande vocale";
        };
    }

    // --- UTILS ---
    function save() { localStorage.setItem('ixa_hist_v9', JSON.stringify(STATE.history)); }
    function autoHeight(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function updateModelBadge(m) { document.getElementById('current-model').textContent = m.split('-')[0].toUpperCase() + " ACTIVE"; }
    function toggleView(v) {
        document.getElementById('chat-flow').style.display = v==='chat'?'flex':'none';
        document.getElementById('input-dock').style.display = v==='chat'?'block':'none';
        document.getElementById('voice-ui').style.display = v==='voice'?'flex':'none';
        document.querySelectorAll('.tabs span').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+v).classList.add('active');
    }

    init();
</script>
</body>
</html>
